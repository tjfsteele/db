<script>
    function updateClock() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('clock').textContent = hh + ":" + mm;
    }
    setInterval(updateClock, 1000);
    updateClock();

    const clean = (v) => (v === undefined || v === null || v === "") ? "---" : v;

    async function update() {
        try {
            const res = await fetch('https://api.npoint.io/f92e069f4e7bf14b4e72');
            const d = await res.json();

            // Header: Batting Team Name + Score and Fielding Team
            // Using BTN (Somerset) and BTS (3/0)
            document.getElementById('main-score').textContent = clean(d.BTN) + " " + clean(d.BTS);
            document.getElementById('bowling-team').textContent = "V " + clean(d.FTN);

            // Batsman 1 Calculation & Display
            let b1sr = (parseFloat(d.B1S) / parseFloat(d.B1B) * 100).toFixed(1);
            document.getElementById('B1N').textContent = clean(d.B1N);
            document.getElementById('B1-full').textContent = clean(d.B1S) + " (" + clean(d.B1B) + ") SR: " + (isNaN(b1sr) ? "0.0" : b1sr);
            
            // Batsman 2 Calculation & Display
            let b2sr = (parseFloat(d.B2S) / parseFloat(d.B2B) * 100).toFixed(1);
            document.getElementById('B2N').textContent = clean(d.B2N);
            document.getElementById('B2-full').textContent = clean(d.B2S) + " (" + clean(d.B2B) + ") SR: " + (isNaN(b2sr) ? "0.0" : b2sr);

            // Bowlers (F1S usually contains the overs/runs/wickets string in your JSON)
            document.getElementById('F1N').textContent = clean(d.F1N);
            document.getElementById('F1-full').textContent = clean(d.F1S);
            
            // If F2N is empty in your data, it will show "---"
            document.getElementById('F2N').textContent = clean(d.F2N);
            document.getElementById('F2-full').textContent = clean(d.F2S);

            // Current Over
            document.getElementById('cov-val').textContent = clean(d.COV);

            // Sundry / Match Info Mapping
            document.getElementById('target').textContent = clean(d.BTT); // BTT: 14
            document.getElementById('rr').textContent = clean(d.RRR);    // RRR: 0.56
            document.getElementById('dlp-value').textContent = "N/A";     // Not in provided JSON
            
            // OVB is often used for Overs Bowled, but if missing, we use a placeholder
            document.getElementById('ovb').textContent = clean(d.F1S).split(' ')[1] || "0.0"; 
            document.getElementById('req').textContent = clean(d.BTT - parseInt(d.BTS)); // Simple math for runs required
            document.getElementById('rem').textContent = clean(d.LWN) || "---"; // Last Wicket Name as fallback

        } catch (e) { console.error("Data fetch error:", e); }
    }

    setInterval(update, 5000);
    update();
</script>

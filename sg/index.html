<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Cricket Scoreboard</title>
    <style>
        :root {
            --orange: #FFAC00;
            --white: #FFFFFF;
            --grey: #888888;
            --bg: #000000;
            --border: #222222;
        }

        body {
            background-color: #1a1a1a;
            color: var(--white);
            font-family: 'Arial Narrow', Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 30px;
            text-transform: uppercase;
        }

        .scoreboard {
            width: 900px;
            background-color: var(--bg);
            border: 2px solid var(--border);
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #clock {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 24px;
            font-weight: bold;
        }

        .header { margin-bottom: 20px; }
        #main-score { font-size: 58px; font-weight: 900; line-height: 1; margin-bottom: 5px; }
        #bowling-team { font-size: 24px; color: var(--grey); }

        .section-label {
            background: #151515;
            font-size: 12px;
            padding: 5px 10px;
            color: #666;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-size: 30px;
            font-weight: bold;
            border-bottom: 1px solid #111;
        }

        .orange { color: var(--orange); }
        .white { color: var(--white); }
        .name-col { flex: 1.5; }
        .stat-col { flex: 1; text-align: right; font-family: monospace; }

        .current-over-bar {
            margin-top: 15px;
            background: #111;
            border: 1px solid #222;
            padding: 12px;
            display: flex;
            align-items: center;
        }
        .co-label { font-size: 12px; color: var(--grey); margin-right: 15px; }
        #cov-val { font-size: 22px; font-weight: bold; color: var(--white); letter-spacing: 5px; }

        .sundry-container { margin-top: 15px; }
        .sundry-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .info-box {
            background: #080808;
            border: 1px solid #1a1a1a;
            padding: 10px;
        }
        .label { display: block; font-size: 11px; color: var(--grey); margin-bottom: 4px; }
        .val { font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="scoreboard">
    <div id="clock">00:00</div>

    <div class="header">
        <div id="main-score">---</div>
        <div id="bowling-team">---</div>
    </div>

    <div class="section-label">BATSMEN</div>
    <div class="data-row orange">
        <span class="name-col" id="B1N">---</span>
        <span class="stat-col" id="B1-full"></span>
    </div>
    <div class="data-row white">
        <span class="name-col" id="B2N">---</span>
        <span class="stat-col" id="B2-full"></span>
    </div>

    <div class="section-label">BOWLERS</div>
    <div class="data-row orange">
        <span class="name-col" id="F1N">---</span>
        <span class="stat-col" id="F1-full"></span>
    </div>
    <div class="data-row white">
        <span class="name-col" id="F2N">---</span>
        <span class="stat-col" id="F2-full"></span>
    </div>

    <div class="current-over-bar">
        <span class="co-label">CURRENT OVER</span>
        <span id="cov-val"></span>
    </div>

    <div class="sundry-container">
        <div class="sundry-row">
            <div class="info-box"><span class="label">TO WIN</span><span class="val" id="target"></span></div>
            <div class="info-box"><span class="label">REQ RR</span><span class="val" id="rrr"></span></div>
            <div class="info-box"><span class="label">DLS PAR</span><span class="val" id="dls-value"></span></div>
        </div>
        <div class="sundry-row">
            <div class="info-box"><span class="label">OVERS</span><span class="val" id="ovs-current"></span></div>
            <div class="info-box"><span class="label">RR</span><span class="val" id="crr"></span></div>
            <div class="info-box"><span class="label">LAST WKT</span><span class="val" id="lwk"></span></div>
        </div>
    </div>
</div>

<script>
    // Utility to ensure empty strings instead of null/undefined
    const clean = (v) => (v === undefined || v === null) ? "" : v;

    function updateClock() {
        const clockEl = document.getElementById('clock');
        if (clockEl) {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            clockEl.textContent = hh + ":" + mm;
        }
    }

    async function updateScoreboard() {
        try {
            const res = await fetch('https://api.npoint.io/f92e069f4e7bf14b4e72');
            const d = await res.json();

            // Main Score Header
            document.getElementById('main-score').textContent = clean(d.BTN) + " " + clean(d.BTS);
            document.getElementById('bowling-team').textContent = "V " + clean(d.FTN);

            // Batsmen
            let b1sr = (parseFloat(d.B1S) / parseFloat(d.B1B) * 100).toFixed(1);
            document.getElementById('B1N').textContent = clean(d.B1N) || "---";
            document.getElementById('B1-full').textContent = clean(d.B1S) + " (" + clean(d.B1B) + ") " + (isNaN(b1sr) ? "" : b1sr);
            
            let b2sr = (parseFloat(d.B2S) / parseFloat(d.B2B) * 100).toFixed(1);
            document.getElementById('B2N').textContent = clean(d.B2N) || "---";
            document.getElementById('B2-full').textContent = clean(d.B2S) + " (" + clean(d.B2B) + ") " + (isNaN(b2sr) ? "" : b2sr);

            // Bowlers
            document.getElementById('F1N').textContent = clean(d.F1N) || "---";
            document.getElementById('F1-full').textContent = clean(d.F1S);
            document.getElementById('F2N').textContent = clean(d.F2N) || "---";
            document.getElementById('F2-full').textContent = clean(d.F2S);

            // Current Over
            document.getElementById('cov-val').textContent = clean(d.COV);

            // Match Info Grid
            document.getElementById('target').textContent = clean(d.BTT);
            document.getElementById('rrr').textContent = clean(d.RRR);
            
            // DLS PAR: Explicitly empty if missing from data
            document.getElementById('dls-value').textContent = clean(d.DLP); 
            
            // Extract Overs from Bowler string "(0.3)"
            const oversMatch = d.F1S ? d.F1S.match(/\(([^)]+)\)/) : null;
            document.getElementById('ovs-current').textContent = oversMatch ? oversMatch[1] : "";
            
            document.getElementById('crr').textContent = clean(d.CRR);
            document.getElementById('lwk').textContent = clean(d.LWK) + " " + clean(d.LWN);

        } catch (e) { 
            console.error("Scoreboard update failed:", e); 
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateClock();
        setInterval(updateClock, 1000);
        updateScoreboard();
        setInterval(updateScoreboard, 5000);
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <title>Agile Tracker</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: space-between; height: 95vh;
            overflow: hidden;
        }
        
        #slot-time { font-size: 28px; margin-top: 20px; font-weight: normal; }
        
        #price-main { margin-top: 10px; }
        #price { font-size: 140px; font-weight: bold; line-height: 0.8; }
        #unit { font-size: 24px; margin-bottom: 5px; }
        
        #next-container { 
            font-size: 32px; border-top: 5px solid #000; 
            padding-top: 15px; width: 85%; margin: 0 auto; 
        }

        /* Kobo-Safe Pixel-Based Graph */
        #graph-wrapper { 
            height: 100px; 
            width: 500px; 
            margin: 20px auto; 
            border-bottom: 2px solid #000; 
            padding: 0;
            overflow: hidden;
            text-align: left; 
            white-space: nowrap;
        }
        
        .bar { 
            background: #000; 
            width: 8px; 
            margin-right: 2px;
            display: inline-block;
            vertical-align: bottom;
        }
        
        .bar.current { 
            background: #fff; 
            border: 1px solid #000; 
            width: 6px; /* Adjusted for border */
        }

        #debug { display: none; font-size: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="slot-time">--:-- - --:--</div>
    
    <div id="price-main">
        <div id="price">--.-</div>
        <div id="unit">p/kWh</div>
    </div>

    <div id="next-container">
        Next: <strong><span id="next-price">--</span>p/kWh</strong>
    </div>

    <div id="graph-wrapper"></div>

    <div id="debug"></div>

    <script>
        var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec";

        function formatTime(iso) {
            var d = new Date(iso);
            var h = d.getHours();
            var m = d.getMinutes();
            return (h < 10 ? '0' : '') + h + ":" + (m < 10 ? '0' : '') + m;
        }

        function updateUI() {
            var cached = localStorage.getItem('agile_data');
            if (!cached) { fetchData(); return; }

            try {
                var schedule = JSON.parse(cached);
                // Ensure chronological order
                schedule.sort(function(a, b) { 
                    return new Date(a.s).getTime() - new Date(b.s).getTime(); 
                });

                var now = new Date().getTime();
                var foundIdx = -1;

                for (var i = 0; i < schedule.length; i++) {
                    var start = new Date(schedule[i].s).getTime();
                    var end = new Date(schedule[i].e).getTime();
                    if (now >= start && now < end) {
                        foundIdx = i;
                        break;
                    }
                }

                if (foundIdx !== -1) {
                    var current = schedule[foundIdx];
                    document.getElementById('price').innerHTML = current.v.toFixed(1);
                    document.getElementById('slot-time').innerHTML = formatTime(current.s) + " - " + formatTime(current.e);
                    
                    var nextVal = schedule[foundIdx + 1] ? schedule[foundIdx + 1].v.toFixed(1) : "--";
                    document.getElementById('next-price').innerHTML = nextVal;
                    
                    drawGraph(schedule, foundIdx);

                    // Re-fetch if we are in the last 4 hours of our 50-slot window
                    var lastSlot = new Date(schedule[schedule.length - 1].s).getTime();
                    if (now > (lastSlot - 14400000)) fetchData();
                } else {
                    fetchData();
                }
            } catch (e) {
                fetchData();
            }
        }

        function drawGraph(data, currentIdx) {
            var wrapper = document.getElementById('graph-wrapper');
            wrapper.innerHTML = ''; 
            
            // Show 50 slots (roughly 25 hours)
            var start = Math.max(0, currentIdx - 15); 
            var end = Math.min(data.length, start + 50);
            
            var maxPrice = 0;
            for (var j = start; j < end; j++) { 
                if (data[j].v > maxPrice) maxPrice = data[j].v; 
            }
            if (maxPrice < 20) maxPrice = 20;

            for (var i = start; i < end; i++) {
                var bar = document.createElement('div');
                bar.className = 'bar';
                if (i === currentIdx) bar.className += ' current';
                
                // Set height in pixels (max 100px)
                var val = data[i].v;
                if (val < 0) val = 0; // Simple floor for negative prices
                var hPx = Math.floor((val / maxPrice) * 100);
                bar.style.height = Math.max(hPx, 2) + 'px';
                
                wrapper.appendChild(bar);
            }
        }

        function fetchData() {
            var xhr = new XMLHttpRequest();
            // Cache buster to ensure fresh data from Google
            xhr.open("GET", SCRIPT_URL + "?t=" + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    try {
                        // Basic validation before saving
                        if (xhr.responseText.indexOf('[') === 0) {
                            localStorage.setItem('agile_data', xhr.responseText);
                            updateUI();
                        }
                    } catch(e) {}
                }
            };
            xhr.send();
        }

        // Start
        updateUI();
    </script>
</body>
</html>

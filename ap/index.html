<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <title>Agile Tracker</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        #price { font-size: 140px; font-weight: bold; display: block; line-height: 0.9; }
        #unit { font-size: 30px; display: block; margin-top: 5px; }
        #next-container { 
            font-size: 32px; color: #000; margin-top: 20px; 
            border-top: 4px solid #000; padding-top: 15px; 
            display: inline-block; width: 75%;
        }
        #time { font-size: 18px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>

    <div id="price-container">
        <span id="price">--</span>
        <span id="unit">p/kWh</span>
    </div>

    <div id="next-container">
        Next: <span id="next-price">--</span>p
    </div>

    <div id="time">Loading...</div>

    <script>
        var SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE";

        function updateUI() {
            var now = new Date();
            var currentTime = now.getTime();
            var cached = localStorage.getItem('agile_data');
            var lastSync = localStorage.getItem('last_sync') || "Never";

            if (cached) {
                var schedule = JSON.parse(cached);
                
                // 1. Sort data oldest to newest (Octopus often sends newest first)
                schedule.sort(function(a, b) {
                    return new Date(a.s).getTime() - new Date(b.s).getTime();
                });

                var currentPrice = "--";
                var nextPrice = "--";
                var foundIdx = -1;

                // 2. Find current slot
                for (var i = 0; i < schedule.length; i++) {
                    var start = new Date(schedule[i].s).getTime();
                    var end = new Date(schedule[i].e).getTime();

                    if (currentTime >= start && currentTime < end) {
                        currentPrice = schedule[i].v.toFixed(1);
                        foundIdx = i;
                        break;
                    }
                }

                // 3. Update Display
                if (foundIdx !== -1) {
                    document.getElementById('price').innerHTML = currentPrice;
                    if (schedule[foundIdx + 1]) {
                        document.getElementById('next-price').innerHTML = schedule[foundIdx + 1].v.toFixed(1);
                    }
                    document.getElementById('time').innerHTML = "Sync: " + lastSync;
                }

                // 4. Check if we need more data (if we are near the end of our list)
                var lastSlotStart = new Date(schedule[schedule.length - 1].s).getTime();
                if (foundIdx === -1 || currentTime > (lastSlotStart - 3600000)) {
                    fetchData();
                }
            } else {
                fetchData();
            }
        }

        function fetchData() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", SCRIPT_URL + "?nocache=" + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    try {
                        JSON.parse(xhr.responseText); // Validate JSON
                        localStorage.setItem('agile_data', xhr.responseText);
                        
                        var d = new Date();
                        var ts = (d.getHours() < 10 ? '0' : '') + d.getHours() + ":" + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
                        localStorage.setItem('last_sync', ts);
                        
                        updateUI();
                    } catch(e) {
                        document.getElementById('time').innerHTML = "JSON Error";
                    }
                }
            };
            xhr.send();
        }

        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <title>Agile Tracker</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: space-between; height: 95vh;
            overflow: hidden;
        }
        #slot-time { font-size: 28px; margin-top: 20px; font-weight: normal; }
        #price-main { margin-top: 10px; }
        #price { font-size: 140px; font-weight: bold; line-height: 0.8; }
        #unit { font-size: 24px; margin-bottom: 5px; color: #555; }
        #next-container { 
            font-size: 32px; border-top: 5px solid #000; 
            padding-top: 15px; width: 85%; margin: 0 auto; 
        }
    
        /* Graph Container */
        #graph-container { margin: 20px auto; width: 500px; }
        #graph-wrapper { 
            height: 100px; border-bottom: 2px solid #000; 
            display: flex; align-items: flex-end; justify-content: center;
        }
        #labels-wrapper { 
            height: 20px; display: flex; justify-content: center; margin-top: 5px;
        }
        
        .bar { background: #000; width: 8px; margin: 0 1px; }
        .bar.current { 
            background: #fff !important; 
            border: 2px solid #000; 
            width: 10px; 
            height: 100px !important; 
        }
        .hour-label { 
            width: 10px; margin: 0 1px; font-size: 9px; color: #666; 
            transform: rotate(-90deg); white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="slot-time">--:-- - --:--</div>
    <div id="price-main">
        <div id="price">--.-</div>
        <div id="unit">p/kWh (Region <span id="reg-label">-</span>)</div>
    </div>
    <div id="next-container">
        Next: <strong><span id="next-price">--</span>p/kWh</strong>
    </div>
    <div id="graph-container">
        <div id="graph-wrapper"></div>
        <div id="labels-wrapper"></div>
    </div>

    <div id="debug-log" style="font-size: 12px; color: #666; text-align: left; margin: 10px; border-top: 1px dashed #ccc; padding-top: 5px;">
        Init...
    </div>
        
    <script>
        var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec";
    
        var queryString = window.location.search.substring(1); 
        var region = (queryString.length > 0) ? queryString.charAt(0).toUpperCase() : "A";
        document.getElementById('reg-label').innerHTML = region;
    
        function log(msg) {
            var d = new Date();
            var time = d.getHours() + ":" + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
            document.getElementById('debug-log').innerHTML = time + " - " + msg;
        }
    
        function formatTime(iso) {
            var d = new Date(iso);
            var h = d.getHours();
            var m = d.getMinutes();
            return (h < 10 ? '0' : '') + h + ":" + (m < 10 ? '0' : '') + m;
        }
    
        // --- JSONP CALLBACK (The 'First Bit') ---
        function handleAgileData(data) {
            if (data && Array.isArray(data)) {
                localStorage.setItem('agile_data_' + region, JSON.stringify(data)); 
                log("Success: Received " + data.length + " slots.");
                updateUI();
            } else {
                log("Error: Data format unexpected");
            }
        }
    
        function fetchData() {
            var attemptKey = 'last_attempt_' + region;
            localStorage.setItem(attemptKey, new Date().getTime().toString());
    
            log("Fetching " + region + " via JSONP...");
    
            var oldScript = document.getElementById('jsonp-request');
            if (oldScript) oldScript.parentNode.removeChild(oldScript);
    
            var script = document.createElement('script');
            script.id = 'jsonp-request';
            // This sends the 'callback' name to your Google Script [cite: 1]
            script.src = SCRIPT_URL + "?region=" + region + "&callback=handleAgileData&t=" + new Date().getTime();
            
            script.onerror = function() { log("Network Error (JSONP failed)"); };
            document.body.appendChild(script);
        }
    
        function drawGraph(schedule, currentIdx) {
            var graph = document.getElementById('graph-wrapper');
            var labels = document.getElementById('labels-wrapper');
            graph.innerHTML = '';
            labels.innerHTML = '';
    
            // Windowing: Show 10 slots before and 30 after current
            var start = Math.max(0, currentIdx - 10);
            var end = Math.min(schedule.length, start + 40);
    
            for (var i = start; i < end; i++) {
                var item = schedule[i];
                
                // 1. Create Bar
                var bar = document.createElement('div');
                bar.className = 'bar' + (i === currentIdx ? ' current' : '');
                var val = Math.max(0, item.v); 
                var h = Math.max(2, Math.min(100, val * 2));
                bar.style.height = h + 'px';
                graph.appendChild(bar);
    
                // 2. Create Label (Every 2nd slot / 1 hour)
                var label = document.createElement('div');
                label.className = 'hour-label';
                if (i % 2 === 0) {
                    var d = new Date(item.s);
                    label.innerHTML = d.getHours() + ":00";
                }
                labels.appendChild(label);
            }
        }
    
        function updateUI() {
            var cacheKey = 'agile_data_' + region;
            var attemptKey = 'last_attempt_' + region;
            var cached = localStorage.getItem(cacheKey);
            var lastAttempt = parseInt(localStorage.getItem(attemptKey)) || 0;
            var now = new Date().getTime();
    
            if (!cached) {
                log("No cache. Fetching...");
                fetchData();
                return;
            }
    
            try {
                var schedule = JSON.parse(cached);
                var foundIdx = -1;
    
                // Loop through sorted data to find current slot 
                for (var i = 0; i < schedule.length; i++) {
                    var start = new Date(schedule[i].s).getTime();
                    var end = new Date(schedule[i].e).getTime();
                    if (now >= start && now < end) {
                        foundIdx = i;
                        break;
                    }
                }
    
                if (foundIdx !== -1) {
                    var current = schedule[foundIdx];
                    document.getElementById('price').innerHTML = current.v.toFixed(1);
                    document.getElementById('slot-time').innerHTML = formatTime(current.s) + " - " + formatTime(current.e);
                    
                    var nextVal = schedule[foundIdx + 1] ? schedule[foundIdx + 1].v.toFixed(1) : "--";
                    document.getElementById('next-price').innerHTML = nextVal;
                    
                    drawGraph(schedule, foundIdx);
                }
    
                // --- RESTORED REFRESH LOGIC ---
                var lastEntry = new Date(schedule[schedule.length - 1].e);
                var isDataOnlyForToday = (lastEntry.getDate() === new Date().getDate());
                var isAfter4PM = (new Date().getHours() >= 16);
                
                // If it's past 4pm and we don't have tomorrow's data yet
                if ((isAfter4PM && isDataOnlyForToday) || foundIdx === -1) {
                    if (now - lastAttempt > 10 * 60 * 1000) { // Check every 10 mins
                        log("Checking for tomorrow's prices...");
                        fetchData();
                    }
                }
            } catch(e) {
                log("UI Error: " + e.message);
                fetchData();
            }
        }
    
        updateUI();
    </script>
</body>

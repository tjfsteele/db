<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <title>Agile Tracker</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: space-between; height: 95vh;
            overflow: hidden;
        }
        
        #slot-time { font-size: 28px; margin-top: 20px; font-weight: normal; }
        
        #price-main { margin-top: 10px; }
        #price { font-size: 140px; font-weight: bold; line-height: 0.8; }
        #unit { font-size: 24px; margin-bottom: 5px; color: #555; }
        
        #next-container { 
            font-size: 32px; border-top: 5px solid #000; 
            padding-top: 15px; width: 85%; margin: 0 auto; 
        }

        #graph-wrapper { 
            height: 100px; width: 500px; margin: 20px auto; 
            border-bottom: 2px solid #000; padding: 0;
            overflow: hidden; text-align: left; white-space: nowrap;
        }
        
        .bar { background: #000; width: 8px; margin-right: 2px; display: inline-block; vertical-align: bottom; }
        .bar.current { background: #fff; border: 1px solid #000; width: 6px; }
    </style>
</head>
<body>

    <div id="slot-time">--:-- - --:--</div>
    
    <div id="price-main">
        <div id="price">--.-</div>
        <div id="unit">p/kWh (Region <span id="reg-label">-</span>)</div>
    </div>

    <div id="next-container">
        Next: <strong><span id="next-price">--</span>p/kWh</strong>
    </div>

    <div id="graph-wrapper"></div>

    <script>
        var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec";

        var queryString = window.location.search.substring(1); 
        var region = (queryString.length > 0) ? queryString.charAt(0).toUpperCase() : "A";
        document.getElementById('reg-label').innerHTML = region;

        function formatTime(iso) {
            var d = new Date(iso);
            var h = d.getHours();
            var m = d.getMinutes();
            return (h < 10 ? '0' : '') + h + ":" + (m < 10 ? '0' : '') + m;
        }

        function updateUI() {
            var cacheKey = 'agile_data_' + region;
            var attemptKey = 'last_attempt_' + region;
            var cached = localStorage.getItem(cacheKey);
            var lastAttempt = parseInt(localStorage.getItem(attemptKey)) || 0;
            var now = new Date().getTime();

            if (!cached) {
                fetchData();
                return;
            }

            try {
                var schedule = JSON.parse(cached);
                schedule.sort(function(a, b) { 
                    return new Date(a.s).getTime() - new Date(b.s).getTime(); 
                });

                var foundIdx = -1;
                for (var i = 0; i < schedule.length; i++) {
                    var start = new Date(schedule[i].s).getTime();
                    var end = new Date(schedule[i].e).getTime();
                    if (now >= start && now < end) {
                        foundIdx = i;
                        break;
                    }
                }

                if (foundIdx !== -1) {
                    var current = schedule[foundIdx];
                    document.getElementById('price').innerHTML = current.v.toFixed(1);
                    document.getElementById('slot-time').innerHTML = formatTime(current.s) + " - " + formatTime(current.e);
                    
                    var nextVal = schedule[foundIdx + 1] ? schedule[foundIdx + 1].v.toFixed(1) : "--";
                    document.getElementById('next-price').innerHTML = nextVal;
                    
                    drawGraph(schedule, foundIdx);

                    // --- IMPROVED REFRESH LOGIC ---
                    // --- KOBO-OPTIMIZED REFRESH LOGIC ---
                    var nowObj = new Date();
                    var currentHour = nowObj.getHours();
                    
                    // Get the date of the very last entry in our schedule
                    var lastEntryEnd = new Date(schedule[schedule.length - 1].e);
                    var todayDate = nowObj.getDate();
                    var lastEntryDate = lastEntryEnd.getDate();
                    
                    // We need an update if:
                    // 1. The data we have ends TODAY (meaning tomorrow's prices aren't loaded yet)
                    // 2. AND it is currently 4 PM or later.
                    var needsTomorrowData = (lastEntryDate === todayDate) && (currentHour >= 16);
                    
                    // Or, a safety check: if we are within 2 hours of running out of data entirely
                    var runningOut = (lastEntryEnd.getTime() - now < 2 * 60 * 60 * 1000);
                    
                    if (needsTomorrowData || runningOut) {
                        // If we've already tried in the last 15 mins, wait. 
                        // Otherwise, hunt for that new data.
                        if (now - lastAttempt > 15 * 60 * 1000) {
                            console.log("Hunting for tomorrow's prices...");
                            fetchData();
                        }
                    } else {
                        // We already have tomorrow's data, or it's too early for the release.
                        // The 60-second page refresh will keep checking the time.
                        console.log("Data is current. Resting.");
                    }
                } else {
                    // Current time not found in data (data is old/exhausted)
                    fetchData();
                }
            } catch (e) {
                fetchData();
            }
        }

        function drawGraph(data, currentIdx) {
            var wrapper = document.getElementById('graph-wrapper');
            wrapper.innerHTML = ''; 
            var start = Math.max(0, currentIdx - 15); 
            var end = Math.min(data.length, start + 50);
            
            var maxPrice = 0;
            for (var j = start; j < end; j++) { 
                if (data[j].v > maxPrice) maxPrice = data[j].v; 
            }
            if (maxPrice < 20) maxPrice = 20;

            for (var i = start; i < end; i++) {
                var bar = document.createElement('div');
                bar.className = 'bar';
                if (i === currentIdx) bar.className += ' current';
                var val = data[i].v;
                if (val < 0) val = 0; 
                var hPx = Math.floor((val / maxPrice) * 100);
                bar.style.height = Math.max(hPx, 2) + 'px';
                wrapper.appendChild(bar);
            }
        }

        function fetchData() {
            var attemptKey = 'last_attempt_' + region;
            localStorage.setItem(attemptKey, new Date().getTime().toString());

            var xhr = new XMLHttpRequest();
            var fetchUrl = SCRIPT_URL + "?region=" + region + "&t=" + new Date().getTime();
            
            xhr.open("GET", fetchUrl, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    try {
                        if (xhr.responseText.indexOf('[') === 0) {
                            localStorage.setItem('agile_data_' + region, xhr.responseText);
                            updateUI();
                        }
                    } catch(e) {}
                }
            };
            xhr.send();
        }

        updateUI();
    </script>
</body>
</html>

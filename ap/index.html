<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <title>Agile Tracker</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        #slot-time { font-size: 30px; font-weight: normal; margin-bottom: 10px; }
        #price { font-size: 150px; font-weight: bold; line-height: 0.8; }
        #unit { font-size: 30px; margin-bottom: 30px; }
        
        #next-container { 
            font-size: 32px; border-top: 5px solid #000; 
            padding-top: 20px; width: 80%; margin: 0 auto;
        }
        
        /* Debug hidden by default. Change 'none' to 'block' to see it again */
        #debug { display: none; text-align: left; font-size: 10px; margin: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="slot-time">--:-- - --:--</div>
    
    <div id="price-container">
        <div id="price">--.-</div>
        <div id="unit">p/kWh</div>
    </div>

    <div id="next-container">
        Next: <strong><span id="next-price">--</span>p</strong>
    </div>

    <div id="debug"></div>

    <script>
        var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec";

        function formatTime(isoString) {
            var d = new Date(isoString);
            var h = d.getHours();
            var m = d.getMinutes();
            return (h < 10 ? '0' : '') + h + ":" + (m < 10 ? '0' : '') + m;
        }

        function updateUI() {
            var now = new Date();
            var currentTime = now.getTime();
            var cached = localStorage.getItem('agile_data');

            if (!cached) {
                fetchData();
                return;
            }

            try {
                var schedule = JSON.parse(cached);
                schedule.sort(function(a, b) {
                    return new Date(a.s).getTime() - new Date(b.s).getTime();
                });

                var foundIdx = -1;
                for (var i = 0; i < schedule.length; i++) {
                    var start = new Date(schedule[i].s).getTime();
                    var end = new Date(schedule[i].e).getTime();

                    if (currentTime >= start && currentTime < end) {
                        foundIdx = i;
                        break;
                    }
                }

                if (foundIdx !== -1) {
                    var current = schedule[foundIdx];
                    document.getElementById('price').innerHTML = current.v.toFixed(1);
                    document.getElementById('slot-time').innerHTML = formatTime(current.s) + " - " + formatTime(current.e);
                    
                    if (schedule[foundIdx + 1]) {
                        document.getElementById('next-price').innerHTML = schedule[foundIdx + 1].v.toFixed(1);
                    }
                    
                    // Fetch fresh data if we're near the end of our list
                    var lastSlot = new Date(schedule[schedule.length - 1].s).getTime();
                    if (currentTime > (lastSlot - 7200000)) fetchData(); 
                } else {
                    fetchData();
                }
            } catch (e) {
                fetchData();
            }
        }

        function fetchData() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", SCRIPT_URL + "?t=" + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    try {
                        JSON.parse(xhr.responseText);
                        localStorage.setItem('agile_data', xhr.responseText);
                        updateUI();
                    } catch(e) {}
                }
            };
            xhr.send();
        }

        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <title>Agile Tracker</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: space-between; height: 95vh;
            overflow: hidden;
        }
        #slot-time { font-size: 28px; margin-top: 20px; font-weight: normal; }
        #price { font-size: 140px; font-weight: bold; line-height: 0.8; margin: 10px 0; }
        #unit { font-size: 24px; color: #555; }
        #next-container { 
            font-size: 32px; border-top: 5px solid #000; 
            padding-top: 15px; width: 85%; margin: 0 auto; 
        }
    
        /* Graph specific layout */
        #graph-container { margin: 20px auto; width: 520px; }
        #graph-wrapper { 
            height: 120px; border-bottom: 2px solid #000; 
            display: flex; align-items: flex-end; justify-content: center;
        }
        
        /* Bars: Fixed width to prevent squashing */
        .bar-group { display: flex; flex-direction: column; align-items: center; width: 12px; flex-shrink: 0; }
        .bar { background: #000; width: 10px; margin: 0 1px; }
        .bar.current { 
            background: #fff !important; 
            border: 2px solid #000; 
            width: 10px; 
            height: 100px !important; /* Visual playhead */
        }
        .hour-label { font-size: 11px; margin-top: 5px; height: 15px; }
    </style>
</head>
<body>
    <div id="slot-time">--:-- - --:--</div>
    <div id="price-main">
        <div id="price">--.-</div>
        <div id="unit">p/kWh (Region <span id="reg-label">-</span>)</div>
    </div>
    <div id="next-container">
        Next: <strong><span id="next-price">--</span>p/kWh</strong>
    </div>
    
    <div id="graph-container">
        <div id="graph-wrapper"></div>
    </div>

    <div id="debug-log" style="font-size: 12px; color: #666; text-align: left; margin: 10px; border-top: 1px dashed #ccc; padding-top: 5px;">
        Init...
    </div>
    <script>
        var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec";
        var queryString = window.location.search.substring(1); 
        var region = (queryString.length > 0) ? queryString.charAt(0).toUpperCase() : "A";
        document.getElementById('reg-label').innerHTML = region;
    
        function handleAgileData(data) {
            if (data && Array.isArray(data)) {
                // FORCE CHRONOLOGICAL SORT: Compare date strings directly 
                data.sort(function(a, b) {
                    return a.s.localeCompare(b.s);
                });
                localStorage.setItem('agile_data_' + region, JSON.stringify(data));
                updateUI();
            }
        }
    
        function drawGraph(schedule, currentIdx) {
            var wrapper = document.getElementById('graph-wrapper');
            wrapper.innerHTML = '';
            
            // Window: 8 slots past to 32 slots future
            var start = Math.max(0, currentIdx - 8);
            var end = Math.min(schedule.length, start + 40);
    
            for (var i = start; i < end; i++) {
                var item = schedule[i];
                var group = document.createElement('div');
                group.className = 'bar-group';
    
                // 1. Create Bar
                var bar = document.createElement('div');
                bar.className = 'bar' + (i === currentIdx ? ' current' : '');
                var h = Math.max(2, Math.min(100, item.v * 2)); // 1p = 2px 
                bar.style.height = h + 'px';
    
                // 2. Create Label
                var label = document.createElement('div');
                label.className = 'hour-label';
                var d = new Date(item.s);
                if (d.getMinutes() === 0) {
                    label.innerHTML = d.getHours();
                }
    
                group.appendChild(bar);
                group.appendChild(label);
                wrapper.appendChild(group);
            }
        } 
        
        function log(msg) {
            var d = new Date();
            var time = d.getHours() + ":" + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
            document.getElementById('debug-log').innerHTML = time + " - " + msg;
        }
    
        function formatTime(iso) {
            var d = new Date(iso);
            return (d.getHours() < 10 ? '0' : '') + d.getHours() + ":" + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
        }
    
        function fetchData() {
            localStorage.setItem('last_attempt_' + region, new Date().getTime());
            log("Fetching...");
            var old = document.getElementById('jsonp-request');
            if (old) old.parentNode.removeChild(old);
            var s = document.createElement('script');
            s.id = 'jsonp-request';
            // Request with callback parameter [cite: 8]
            s.src = SCRIPT_URL + "?region=" + region + "&callback=handleAgileData&t=" + new Date().getTime();
            document.body.appendChild(s);
        }
        
        function updateUI() {
            var cached = localStorage.getItem('agile_data_' + region);
            var lastAttempt = parseInt(localStorage.getItem('last_attempt_' + region)) || 0;
            var now = new Date().getTime();
    
            if (!cached) { fetchData(); return; }
    
            try {
                var schedule = JSON.parse(cached);
                var foundIdx = -1;
    
                // Find current time slot 
                for (var i = 0; i < schedule.length; i++) {
                    if (now >= new Date(schedule[i].s).getTime() && now < new Date(schedule[i].e).getTime()) {
                        foundIdx = i;
                        break;
                    }
                }
    
                if (foundIdx !== -1) {
                    var item = schedule[foundIdx];
                    document.getElementById('price').innerHTML = item.v.toFixed(1);
                    document.getElementById('slot-time').innerHTML = formatTime(item.s) + " - " + formatTime(item.e);
                    document.getElementById('next-price').innerHTML = schedule[foundIdx+1] ? schedule[foundIdx+1].v.toFixed(1) : "--";
                    drawGraph(schedule, foundIdx);
                }
    
                // Automatic refresh logic [cite: 4]
                var lastEntry = new Date(schedule[schedule.length - 1].e);
                var isDataOnlyForToday = (lastEntry.getDate() === new Date().getDate());
                if ((new Date().getHours() >= 16 && isDataOnlyForToday) || foundIdx === -1) {
                    if (now - lastAttempt > 600000) { // 10 min throttle
                        fetchData();
                    }
                }
            } catch(e) { log("UI Error"); fetchData(); }
        }
    
        updateUI();
    </script>
</body>

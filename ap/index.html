<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60"> <title>Agile Tracker</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        #price-container { margin-bottom: 10px; }
        #price { font-size: 140px; font-weight: bold; display: block; line-height: 0.9; }
        #unit { font-size: 30px; display: block; margin-top: 5px; }
        #next-container { 
            font-size: 32px; color: #000; margin-top: 20px; 
            border-top: 4px solid #000; padding-top: 15px; 
            display: inline-block; width: 70%;
        }
        #time { font-size: 18px; color: #444; margin-top: 30px; }
    </style>
</head>
<body>

    <div id="price-container">
        <span id="price">--</span>
        <span id="unit">p/kWh</span>
    </div>

    <div id="next-container">
        Next: <span id="next-price">--</span>p
    </div>

    <div id="time">Loading...</div>

    <script>
        var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec";

        function updateUI() {
            var now = new Date();
            var currentTime = now.getTime();
            var cached = localStorage.getItem('agile_data');
            var lastSync = localStorage.getItem('last_sync') || "Never";

            if (cached) {
                var schedule = JSON.parse(cached);
                var found = false;

                for (var i = 0; i < schedule.length; i++) {
                    var start = new Date(schedule[i].s).getTime();
                    var end = new Date(schedule[i].e).getTime();

                    if (currentTime >= start && currentTime < end) {
                        document.getElementById('price').innerHTML = schedule[i].v.toFixed(1);
                        
                        var nextVal = (schedule[i+1]) ? schedule[i+1].v.toFixed(1) : "??";
                        document.getElementById('next-price').innerHTML = nextVal;
                        
                        document.getElementById('time').innerHTML = "Sync: " + lastSync;
                        found = true;
                        break;
                    }
                }

                // If we have data but it's expired (e.g. past midnight), or we're in the last 2 slots
                if (!found || (currentTime > new Date(schedule[schedule.length-2].s).getTime())) {
                    fetchData();
                }
            } else {
                fetchData();
            }
        }

        function fetchData() {
            var xhr = new XMLHttpRequest();
            // Add a cache-buster to the URL
            xhr.open("GET", SCRIPT_URL + "?nocache=" + new Date().getTime(), true);
            xhr.timeout = 30000; 

            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    try {
                        // Validate it's actually JSON before saving
                        var testJson = JSON.parse(xhr.responseText);
                        localStorage.setItem('agile_data', xhr.responseText);
                        
                        var d = new Date();
                        var ts = d.getHours() + ":" + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
                        localStorage.setItem('last_sync', ts);
                        
                        updateUI();
                    } catch(e) {
                        document.getElementById('time').innerHTML = "Sync Error (JSON)";
                    }
                }
            };
            xhr.onerror = function() { document.getElementById('time').innerHTML = "Sync Failed (Network)"; };
            xhr.send();
        }

        // Run immediately
        updateUI();
    </script>
</body>
</html>

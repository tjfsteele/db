<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agile Tracker Debug</title>
    <style>
        body { background: #f0f0f0; font-family: sans-serif; padding: 20px; color: black; }
        #display { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #price { font-size: 80px; font-weight: bold; }
        #debug { 
            text-align: left; font-family: monospace; font-size: 12px; 
            background: #333; color: #0f0; padding: 15px; margin-top: 20px; 
            border-radius: 5px; overflow-x: auto; white-space: pre-wrap;
            height: 200px;
        }
    </style>
</head>
<body>

    <div id="display">
        <div id="price">--.-</div>
        <div style="font-size: 24px;">Next: <span id="next-price">--</span>p</div>
    </div>

    <div id="debug">Console Log:</div>

    <script>
        // REPLACE THIS WITH YOUR ACTUAL URL
        var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec";

        function log(msg) {
            var div = document.getElementById('debug');
            div.innerHTML += "\n> " + msg;
            div.scrollTop = div.scrollHeight;
            console.log(msg);
        }

        // Global error handler to catch syntax errors or crashes
        window.onerror = function(msg, url, line) {
            log("CRITICAL ERROR: " + msg + " at line " + line);
        };

        function updateUI() {
            log("Checking local storage...");
            var now = new Date();
            var currentTime = now.getTime();
            var cached = localStorage.getItem('agile_data');

            if (!cached) {
                log("Nothing in cache. Fetching...");
                fetchData();
                return;
            }

            try {
                var schedule = JSON.parse(cached);
                
                // Sort to ensure we find the right 'next' slot
                schedule.sort(function(a, b) {
                    return new Date(a.s).getTime() - new Date(b.s).getTime();
                });

                var foundIdx = -1;
                for (var i = 0; i < schedule.length; i++) {
                    var start = new Date(schedule[i].s).getTime();
                    var end = new Date(schedule[i].e).getTime();
                    if (currentTime >= start && currentTime < end) {
                        foundIdx = i;
                        break;
                    }
                }

                if (foundIdx !== -1) {
                    var currentVal = schedule[foundIdx].v.toFixed(1);
                    var nextVal = schedule[foundIdx+1] ? schedule[foundIdx+1].v.toFixed(1) : "??";
                    
                    document.getElementById('price').innerHTML = currentVal;
                    document.getElementById('next-price').innerHTML = nextVal;
                    log("UI Updated: Current " + currentVal);
                } else {
                    log("Time " + now.toISOString() + " not found in data. Re-fetching...");
                    fetchData();
                }
            } catch (e) {
                log("Processing Error: " + e.message);
            }
        }

        function fetchData() {
            log("Calling Google Script...");
            
            // Note: Kobo/Older browsers sometimes prefer this older XHR style
            var xhr = new XMLHttpRequest();
            
            // Google Apps Script requires following redirects. 
            // Browsers do this automatically, but only if CORS is right.
            xhr.open("GET", SCRIPT_URL, true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4) {
                    log("XHR Finished. Status: " + xhr.status);
                    if (xhr.status == 200) {
                        var text = xhr.responseText;
                        if (text.indexOf('[') === 0) { // Check if it looks like JSON
                            localStorage.setItem('agile_data', text);
                            log("Success! Data saved.");
                            updateUI();
                        } else {
                            log("Error: Received non-JSON response. (Is the script published as 'Anyone'?)");
                        }
                    } else {
                        log("HTTP Error: " + xhr.status);
                    }
                }
            };
            
            xhr.onerror = function() {
                log("Network Error. Check if URL is correct and published to 'Anyone'.");
            };
            
            xhr.send();
        }

        // Start
        updateUI();
    </script>
</body>
</html>

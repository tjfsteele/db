<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <title>Agile Tracker</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: space-between; height: 95vh;
            overflow: hidden;
        }
        
        #slot-time { font-size: 28px; margin-top: 20px; font-weight: normal; }
        
        #price-main { margin-top: 10px; }
        #price { font-size: 140px; font-weight: bold; line-height: 0.8; }
        #unit { font-size: 24px; margin-bottom: 5px; color: #555; }
        
        #next-container { 
            font-size: 32px; border-top: 5px solid #000; 
            padding-top: 15px; width: 85%; margin: 0 auto; 
        }

        #graph-wrapper { 
            height: 100px; width: 500px; margin: 20px auto; 
            border-bottom: 2px solid #000; padding: 0;
            overflow: hidden; text-align: left; white-space: nowrap;
        }
        
        .bar { background: #000; width: 8px; margin-right: 2px; display: inline-block; vertical-align: bottom; }
        .bar.current { background: #fff; border: 1px solid #000; width: 6px; }
    </style>
</head>
<body>
    <div id="slot-time">--:-- - --:--</div>
    <div id="price-main">
        <div id="price">--.-</div>
        <div id="unit">p/kWh (Region <span id="reg-label">-</span>)</div>
    </div>
    <div id="next-container">
        Next: <strong><span id="next-price">--</span>p/kWh</strong>
    </div>
    <div id="graph-wrapper"></div>

    <div id="debug-log" style="font-size: 12px; color: #666; text-align: left; margin: 10px; border-top: 1px dashed #ccc; padding-top: 5px;">
        Init...
    </div>

    <script>
        var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec";

        var queryString = window.location.search.substring(1); 
        var region = (queryString.length > 0) ? queryString.charAt(0).toUpperCase() : "A";
        document.getElementById('reg-label').innerHTML = region;

        function log(msg) {
            var d = new Date();
            var time = d.getHours() + ":" + d.getMinutes() + ":" + d.getSeconds();
            document.getElementById('debug-log').innerHTML = time + " - " + msg;
        }

        function formatTime(iso) {
            var d = new Date(iso);
            var h = d.getHours();
            var m = d.getMinutes();
            return (h < 10 ? '0' : '') + h + ":" + (m < 10 ? '0' : '') + m;
        }

        function updateUI() {
            var cacheKey = 'agile_data_' + region;
            var attemptKey = 'last_attempt_' + region;
            var cached = localStorage.getItem(cacheKey);
            var lastAttempt = parseInt(localStorage.getItem(attemptKey)) || 0;
            var now = new Date().getTime();

            if (!cached) {
                log("No cache found. Fetching...");
                fetchData();
                return;
            }

            try {
                var schedule = JSON.parse(cached);
                
                // Kobo might struggle with large arrays, let's log the size
                log("Data: " + schedule.length + " rows. Last entry: " + formatTime(schedule[schedule.length-1].e));

                var foundIdx = -1;
                for (var i = 0; i < schedule.length; i++) {
                    var start = new Date(schedule[i].s).getTime();
                    var end = new Date(schedule[i].e).getTime();
                    if (now >= start && now < end) {
                        foundIdx = i;
                        break;
                    }
                }

                if (foundIdx !== -1) {
                    var current = schedule[foundIdx];
                    document.getElementById('price').innerHTML = current.v.toFixed(1);
                    document.getElementById('slot-time').innerHTML = formatTime(current.s) + " - " + formatTime(current.e);
                    var nextVal = schedule[foundIdx + 1] ? schedule[foundIdx + 1].v.toFixed(1) : "--";
                    document.getElementById('next-price').innerHTML = nextVal;
                    drawGraph(schedule, foundIdx);
                }

                // REFRESH LOGIC
                var lastEntry = new Date(schedule[schedule.length - 1].e);
                var isDataOnlyForToday = (lastEntry.getDate() === new Date().getDate());
                var isAfter4PM = (new Date().getHours() >= 16);
                
                if ((isAfter4PM && isDataOnlyForToday) || foundIdx === -1) {
                    if (now - lastAttempt > 5 * 60 * 1000) {
                        log("Attempting fetch for tomorrow...");
                        fetchData();
                    } else {
                        log("Waiting for retry timer...");
                    }
                }
            } catch(e) {
                log("Error parsing JSON: " + e);
                fetchData();
            }
        }

        // ... keep your drawGraph function as is ...

        function fetchData() {
            var attemptKey = 'last_attempt_' + region;
            localStorage.setItem(attemptKey, new Date().getTime().toString());

            var xhr = new XMLHttpRequest();
            // Intense cache busting for Kobo
            var fetchUrl = SCRIPT_URL + "?region=" + region + "&t=" + new Date().getTime() + "&nocache=" + Math.random();
            
            xhr.open("GET", fetchUrl, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        if (xhr.responseText.indexOf('[') === 0) {
                            localStorage.setItem('agile_data_' + region, xhr.responseText);
                            log("Fetch Success!");
                            updateUI();
                        } else {
                            log("Fetch Error: Invalid JSON start");
                        }
                    } else {
                        log("XHR Error Status: " + xhr.status);
                    }
                }
            };
            xhr.send();
        }

        updateUI();
    </script>
</body>

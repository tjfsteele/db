<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div 1 Red Ball Points</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #b30000;
            --primary-hover: #800000;
            --border-color: #dadce0;
            --accent-bg: #fdf2f2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #111;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fff;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--accent-bg);
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            display: none;
        }

        .result-main {
            font-size: 1.15rem;
            font-weight: 800;
            color: #000;
            line-height: 1.5;
        }
        
        .result-details {
            font-size: 0.85rem;
            color: #444;
            margin-top: 10px;
            line-height: 1.6;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }

        fieldset {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #fafbfc;
        }

        legend {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 0 6px;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Div 1 Red Ball Points (1302)</h2>

    <div class="form-row">
        <div class="form-group">
            <label for="agreedOvers">Reduced overs</label>
            <input type="number" id="agreedOvers" value="110" min="1" oninput="updateCalculatedOversLabel()">
        </div>
        <div class="form-group">
            <label for="matchOutcome">Result</label>
            <select id="matchOutcome" onchange="toggleInputs()">
                <option value="won1">Team 1 Win</option>
                <option value="won2">Team 2 Win</option>
                <option value="draw">Drawn</option>
                <option value="tie">Tied</option>
                <option value="abandoned">Abandoned</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>
    </div>

    <!-- Team 1 -->
    <fieldset id="team1Fields">
        <legend>Team 1 (Batting First)</legend>
        <div class="form-row">
            <div class="form-group">
                <label for="t1Runs">Runs</label>
                <input type="number" id="t1Runs" value="0" min="0">
            </div>
            <div class="form-group">
                <label for="t1Wickets">Wickets</label>
                <input type="number" id="t1Wickets" value="0" min="0" max="10">
            </div>
            <div class="form-group">
                <label for="t1Overs">Overs</label>
                <input type="number" id="t1Overs" value="0" step="0.1" min="0">
            </div>
        </div>
        <div class="form-group" id="t1LookbackGroup">
            <label for="t1LookbackRuns" id="lookbackLabel">Runs Scored at <span id="cutoffOversText">52</span> Overs</label>
            <input type="number" id="t1LookbackRuns" value="0" min="0">
        </div>
    </fieldset>

    <!-- Team 2 -->
    <fieldset id="team2Fields">
        <legend>Team 2 (Batting Second)</legend>
        <div class="form-row">
            <div class="form-group">
                <label for="t2Runs">Runs</label>
                <input type="number" id="t2Runs" value="0" min="0">
            </div>
            <div class="form-group">
                <label for="t2Wickets">Wickets</label>
                <input type="number" id="t2Wickets" value="0" min="0" max="10">
            </div>
            <div class="form-group">
                <label for="t2Overs">Overs</label>
                <input type="number" id="t2Overs" value="0" step="0.1" min="0">
            </div>
        </div>
    </fieldset>

    <button type="button" onclick="calculateMatchPoints()">Calculate Points</button>

    <div class="result-box" id="resultBox">
        <div id="resultOutput" class="result-main"></div>
        <div id="detailsOutput" class="result-details"></div>
    </div>
</div>

<script>
    function updateCalculatedOversLabel() {
        const agreed = parseFloat(document.getElementById("agreedOvers").value) || 110;
        const X = agreed / 110;
        const targetOvers = Math.floor(52 * X);
        document.getElementById("cutoffOversText").innerText = targetOvers;
    }

    function toggleInputs() {
        const outcome = document.getElementById("matchOutcome").value;
        const t1Fields = document.getElementById("team1Fields");
        const team2Fields = document.getElementById("team2Fields");
        
        if (outcome === "cancelled") {
            t1Fields.style.display = "none";
            team2Fields.style.display = "none";
        } else {
            t1Fields.style.display = "block";
            team2Fields.style.display = "block";
        }
    }

    function calculateMatchPoints() {
        const agreed = parseFloat(document.getElementById("agreedOvers").value) || 110;
        const outcome = document.getElementById("matchOutcome").value;
        
        const X = agreed / 110;
        const xPercentage = X * 100; // Format X as a percentage
        
        const t1Runs = parseInt(document.getElementById("t1Runs").value) || 0;
        const t1Wickets = parseInt(document.getElementById("t1Wickets").value) || 0;
        const t1Overs = parseFloat(document.getElementById("t1Overs").value) || 1;
        const t1Lookback = parseInt(document.getElementById("t1LookbackRuns").value) || 0;

        const t2Runs = parseInt(document.getElementById("t2Runs").value) || 0;
        const t2Wickets = parseInt(document.getElementById("t2Wickets").value) || 0;
        const t2Overs = parseFloat(document.getElementById("t2Overs").value) || 1;

        let t1MatchPts = 0;
        let t2MatchPts = 0;
        let eligibleForBonus = false;

        // 1. Calculate Base Match Points
        if (outcome === "won1") {
            t1MatchPts = 25;
            t2MatchPts = 0;
        } else if (outcome === "won2") {
            t1MatchPts = 0;
            t2MatchPts = 25;
        } else if (outcome === "tie") {
            t1MatchPts = 18;
            t2MatchPts = 18;
        } else if (outcome === "abandoned") {
            t1MatchPts = 7;
            t2MatchPts = 7;
            eligibleForBonus = true;
        } else if (outcome === "cancelled") {
            t1MatchPts = 7;
            t2MatchPts = 7;
            eligibleForBonus = false;
        } else if (outcome === "draw") {
            eligibleForBonus = true;
            const t1RunRate = t1Runs / (t1Overs || 1);
            const t2RunRate = t2Runs / (t2Overs || 1);
            if (t1RunRate > t2RunRate) {
                t1MatchPts = 4;
                t2MatchPts = 2;
            } else if (t2RunRate > t1RunRate) {
                t1MatchPts = 2;
                t2MatchPts = 4;
            } else {
                t1MatchPts = 3;
                t2MatchPts = 3;
            }
        }

        // 2. Calculate Bonus Points
        let t1BonusBat = 0, t1BonusBowl = 0;
        let t2BonusBat = 0, t2BonusBowl = 0;

        if (eligibleForBonus || outcome === "won1" || outcome === "won2") {
            const t1BowlingBonus = Math.floor(t2Wickets / 2);
            const t2BowlingBonus = Math.floor(t1Wickets / 2);

            function getMilestonePoints(runs) {
                let pts = 0;
                if (runs >= Math.floor(250 * X)) pts = 5;
                else if (runs >= Math.floor(225 * X)) pts = 4;
                else if (runs >= Math.floor(200 * X)) pts = 3;
                else if (runs >= Math.floor(175 * X)) pts = 2;
                else if (runs >= Math.floor(150 * X)) pts = 1;
                return pts;
            }

            let t1BatBonus = getMilestonePoints(t1Lookback) * 2;
            let t2BatBonus = getMilestonePoints(t2Runs);

            if (outcome === "won1") {
                t2BonusBat = t2BatBonus; t2BonusBowl = t2BowlingBonus;
            } else if (outcome === "won2") {
                t1BonusBat = t1BatBonus; t1BonusBowl = t1BowlingBonus;
            } else if (outcome === "draw" || outcome === "abandoned") {
                t1BonusBat = t1BatBonus; t1BonusBowl = t1BowlingBonus;
                t2BonusBat = t2BatBonus; t2BonusBowl = t2BowlingBonus;
            }
        }

        // Final Tallies
        const t1Total = t1MatchPts + t1BonusBat + t1BonusBowl;
        const t2Total = t2MatchPts + t2BonusBat + t2BonusBowl;

        let outcomeString = document.getElementById("matchOutcome").options[document.getElementById("matchOutcome").selectedIndex].text;
        
        document.getElementById("resultOutput").innerHTML = `
            ${outcomeString} % Overs Available: <strong>${xPercentage.toFixed(2)}%</strong>)<br>
            <span style="color:#111;">Team 1: <strong>${t1Total} Points</strong></span><br>
            <span style="color:#111;">Team 2: <strong>${t2Total} Points</strong></span>
        `;

        document.getElementById("detailsOutput").innerHTML = `
            <strong>Points Breakdown:</strong><br>
            • <strong>Team 1:</strong> Match: ${t1MatchPts} | Batting Bonus: ${t1BonusBat} | Bowling Bonus: ${t1BonusBowl}<br>
            • <strong>Team 2:</strong> Match: ${t2MatchPts} | Batting Bonus: ${t2BonusBat} | Bowling Bonus: ${t2BonusBowl}<br>
            <br>
            <span style="font-size:0.8rem; color:#666;">
                Batting points for this match: 
                1pt: ${Math.floor(150 * X)} | 
                2pt: ${Math.floor(175 * X)} | 
                3pt: ${Math.floor(200 * X)} | 
                4pt: ${Math.floor(225 * X)} | 
                5pt: ${Math.floor(250 * X)}
            </span>
        `;
        
        document.getElementById("resultBox").style.display = "block";
    }

    updateCalculatedOversLabel();
</script>
</body>
</html>

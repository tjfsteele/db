<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Rates</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root { --agile: #f03292; --tracker: #4bc0c0; --gas: #ff9f40; --bg: #0d0d12; --card: #1a1a24; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 8px; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px 15px 5px;
        }
        .title { font-size: 0.9rem; font-weight: bold; color: #eee; }

        .region-picker {
            display: flex;
            align-items: center;
            background: #2a2a35;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        #regionSelect {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.7rem;
            text-transform: uppercase;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            padding-right: 5px;
        }

        /* Fix for the white background on dropdown options */
        #regionSelect option {
            background: #2a2a35;
            color: #fff;
        }

        .dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }

        .card { 
            background: var(--card); 
            padding: 12px 4px; 
            border-radius: 8px; 
            text-align: center; 
            border-bottom: 3px solid #333; 
        }

        .val { font-size: 1.2rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; font-weight: 600; }

        @media (min-width: 768px) {
            .dash { gap: 15px; }
            .card { padding: 20px; }
            .val { font-size: 2rem; }
            .label { font-size: 0.8rem; }
            .title { font-size: 1.2rem; }
        }

        .chart-box { background: var(--card); padding: 8px; border-radius: 12px; height: 65vh; min-height: 400px; }
        #mobile-controls { display: none; text-align: center; margin-bottom: 10px; }
        #toggleDay { background: #2a2a35; color: #fff; border: 1px solid #444; padding: 8px 20px; border-radius: 6px; cursor: pointer; }
        #updated-tag { text-align: right; font-size: 0.6rem; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">Octopus Smart Rates</div>
        <div class="region-picker">
            <select id="regionSelect">
                <option value="A">Region A (Eastern)</option>
                <option value="B">Region B (E. Midlands)</option>
                <option value="C">Region C (London)</option>
                <option value="D">Region D (Mersey/NW)</option>
                <option value="E">Region E (W. Midlands)</option>
                <option value="F">Region F (N. Eastern)</option>
                <option value="G">Region G (N. Western)</option>
                <option value="H">Region H (Southern)</option>
                <option value="J">Region J (S. Eastern)</option>
                <option value="K">Region K (S. Wales)</option>
                <option value="L">Region L (S. Western)</option>
                <option value="M">Region M (Yorkshire)</option>
                <option value="N">Region N (S. Scotland)</option>
                <option value="P">Region P (N. Scotland)</option>
            </select>
            <span style="font-size: 0.5rem; color: #888;">▼</span>
        </div>
    </div>

    <div class="dash">
        <div class="card" style="border-color: var(--agile)"><span class="label">Agile</span><span class="val" id="ca">-</span></div>
        <div class="card" style="border-color: var(--tracker)"><span class="label">Tracker Elec</span><span class="val" id="ce">-</span></div>
        <div class="card" style="border-color: var(--gas)"><span class="label">Tracker Gas</span><span class="val" id="cg">-</span></div>
    </div>

    <div id="mobile-controls"><button id="toggleDay">Show Tomorrow</button></div>
    <div class="chart-box"><canvas id="mainChart"></canvas></div>
    <div id="updated-tag">Syncing...</div>
</div>

<script>
    Chart.register(window['chartjs-plugin-annotation']);
    
    const regionSelector = document.getElementById('regionSelect');
    let REG = localStorage.getItem('octo_reg') || 'A';
    regionSelector.value = REG;

    const fetchJSON = url => fetch(url).then(r => r.json());
    let myChart = null;
    let viewingTomorrow = false; 

    regionSelector.addEventListener('change', (e) => {
        REG = e.target.value;
        localStorage.setItem('octo_reg', REG);
        updateDashboard();
    });

    document.getElementById('toggleDay').addEventListener('click', () => {
        viewingTomorrow = !viewingTomorrow;
        document.getElementById('toggleDay').innerText = viewingTomorrow ? "Show Today" : "Show Tomorrow";
        updateDashboard();
    });

    async function updateDashboard() {
        try {
            const [aData, eData, gData] = await Promise.all([
                fetchJSON(`https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REG}/standard-unit-rates/`),
                fetchJSON(`https://api.octopus.energy/v1/products/SILVER-26-04-01/electricity-tariffs/E-1R-SILVER-26-04-01-${REG}/standard-unit-rates/`),
                fetchJSON(`https://api.octopus.energy/v1/products/SILVER-26-04-01/gas-tariffs/G-1R-SILVER-261-${REG}/standard-unit-rates/`)
            ]);

            const agileFull = aData.results.sort((a,b) => new Date(a.valid_from) - new Date(b.valid_from));
            const now = new Date();
            const today = new Date(); today.setHours(0,0,0,0);
            const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
            
            const modernData = agileFull.filter(d => new Date(d.valid_from) >= today);
            const isMobile = window.innerWidth < 768;
            const hasTomorrowData = modernData.some(d => new Date(d.valid_from) >= tomorrow);

            if (isMobile && hasTomorrowData) {
                document.getElementById('mobile-controls').style.display = 'block';
            } else {
                document.getElementById('mobile-controls').style.display = 'none';
                viewingTomorrow = false; 
            }

            const filteredAgile = isMobile 
                ? modernData.filter(d => {
                    const dDate = new Date(d.valid_from);
                    return viewingTomorrow ? dDate.getDate() === tomorrow.getDate() : dDate.getDate() === today.getDate();
                }) 
                : modernData;

            const labels = filteredAgile.map(d => {
                const dt = new Date(d.valid_from);
                const hrs = dt.getHours();
                const mins = dt.getMinutes();
                if (hrs === 0 && mins === 0) return dt.toLocaleDateString([], {day:'2-digit', month:'short'});
                if (mins === 0 && hrs % 3 === 0) return hrs.toString().padStart(2, '0') + ':00';
                return ''; 
            });
            
            const nowIdx = (isMobile && viewingTomorrow) ? -1 : filteredAgile.findIndex(d => new Date(d.valid_from) > now) - 1;
            
            // NEW: Find the rate valid for this exact moment
            const curA = agileFull.find(s => new Date(s.valid_from) <= now && new Date(s.valid_to) > now);
            const curE = eData.results.find(s => new Date(s.valid_from) <= now && new Date(s.valid_to) > now);
            const curG = gData.results.find(s => new Date(s.valid_from) <= now && new Date(s.valid_to) > now);
            
            document.getElementById('ca').innerText = curA ? curA.value_inc_vat.toFixed(1)+'p' : '-';
            document.getElementById('ce').innerText = curE ? curE.value_inc_vat.toFixed(1)+'p' : '-';
            document.getElementById('cg').innerText = curG ? curG.value_inc_vat.toFixed(1)+'p' : '-';
            document.getElementById('updated-tag').innerText = "Last Sync: " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if (myChart) myChart.destroy();

            myChart = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Agile', data: filteredAgile.map(d => d.value_inc_vat), borderColor: '#f03292', stepped: 'after', pointRadius: 0, borderWidth: 2 },
                        { label: 'Elec Trk', data: filteredAgile.map(a => {
                                const aDate = new Date(a.valid_from).getDate();
                                const trk = eData.results.find(t => new Date(t.valid_from).getDate() === aDate);
                                return trk ? trk.value_inc_vat : null;
                            }), borderColor: '#4bc0c0', stepped: 'before', pointRadius: 0, borderWidth: 1.5 }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(26, 26, 36, 0.9)',
                            callbacks: {
                                title: (ctx) => new Date(filteredAgile[ctx[0].dataIndex].valid_from).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                                label: (ctx) => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}p`
                            }
                        },
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 }, color: '#aaa' } },
                        annotation: {
                            annotations: {
                                nowLine: { type: 'line', xMin: nowIdx, xMax: nowIdx, borderColor: 'rgba(255, 255, 255, 0.4)', borderWidth: 2, display: nowIdx >= 0,
                                    label: { content: 'NOW', display: true, position: 'start', backgroundColor: 'rgba(0,0,0,0.5)', font: { size: 9 } } 
                                }
                            }
                        }
                    },
                    scales: { 
                        y: { position: 'left', beginAtZero: true, ticks: { color: '#aaa', font: { size: 10 } }, grid: { color: '#222' } },
                        x: { grid: { color: (ctx) => (ctx.tick && ctx.tick.label !== '') ? '#333' : 'transparent' },
                            ticks: { color: (ctx) => (ctx.tick.label && ctx.tick.label.includes(':')) ? '#aaa' : '#fff', autoSkip: false, maxRotation: 0, 
                                font: (ctx) => {
                                    const isDate = ctx.tick.label && !ctx.tick.label.includes(':');
                                    return { size: 9, weight: isDate ? 'bold' : 'normal' };
                                }
                            } 
                        }
                    }
                }
            });
        } catch (e) {
            document.getElementById('updated-tag').innerText = "Update Failed - Check Region/Network";
        }
    }

    updateDashboard();
    setInterval(updateDashboard, 1800000);
</script>
</body>
</html>

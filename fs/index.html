<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chromecast Scoreboard</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .scoreboard-container { width: 920px; margin: 0 auto; border: 1px solid #333; padding: 25px; background: #000; }
        
        .left-col { float: left; width: 550px; }
        .right-col { float: right; width: 330px; }
        .clearfix { clear: both; }

        .header { border-bottom: 2px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .team-names { font-size: 24px; font-weight: bold; color: #FFD700; text-transform: uppercase; }
        
        .score-row { text-align: center; margin-bottom: 30px; }
        .total-score { font-size: 55px; font-weight: bold; line-height: 1; }
        .overs { font-size: 35px; color: #888; margin-left: 10px; }

        .section-header { color: #888; border-bottom: 1px solid #444; margin: 20px 0 10px 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        
        .player-row { border-bottom: 1px solid #1a1a1a; padding: 6px 0; font-size: 20px; min-height: 24px; }
        .player-name { float: left; }
        .player-stat { float: right; color: #bbb; text-align: right; max-width: 250px; }
        
        .info-item { border-bottom: 1px solid #222; padding: 10px 0; font-size: 20px; }
        .info-label { color: #aaa; }
        .info-value { float: right; font-weight: bold; color: #fff; }
        
        .striker-active { font-weight: bold; color: #fff; }
        .bowler-stats { font-family: monospace; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div class="scoreboard-container">
    <div class="header">
        <div class="team-names" id="team-header">Loading...</div>
    </div>

    <div class="score-row">
        <span class="total-score" id="main-score">0-0</span>
        <span class="overs" id="main-overs">(0.0)</span>
    </div>

    <div class="left-col">
        <div class="section-header">Batting: <span id="view-label" style="color:#FFD700"></span></div>
        <div id="batting-rows"></div>
    </div>

    <div class="right-col">
        <div class="section-header" id="bowling-header">Bowling</div>
        <div id="bowling-rows"></div>

        <div id="match-info-section" style="display:none;">
            <div class="section-header">Match Info</div>
            <div class="info-item"><span class="info-label">Runs to Win</span><span class="info-value" id="f226">-</span></div>
            <div class="info-item"><span class="info-label">Required RR</span><span class="info-value" id="f326">-</span></div>
            <div class="info-item"><span class="info-label">Current RR</span><span class="info-value" id="f325">-</span></div>
        </div>
    </div>
    <div class="clearfix"></div>
</div>

<script>
    var cachedData = null;

    // Legacy-safe capitalization function
    function formatString(str) {
        if (!str || str.trim() === "" || str === "0") return "";
    
        let lower = str.toLowerCase().trim();
    
        // Normalise full cricket terms to abbreviations
        lower = lower
            .replace(/\bcaught\b/g, "c")
            .replace(/\bbowled\b/g, "b")
            .replace(/\bstumped\b/g, "st")
            .replace(/\blbw\b/g, "lbw")
            .replace(/\brun out\b/g, "run out")
            .replace(/\bnot out\b/g, "not out");
    
        // Words that must stay lowercase in cricket notation
        const keepLower = new Set([
            "c", "b", "lbw", "st", "run", "out", "not"
        ]);
    
        return lower
            .split(" ")
            .map(word => {
                if (keepLower.has(word)) return word;
                if (!isNaN(word)) return word; // numbers unchanged
                return word.charAt(0).toUpperCase() + word.slice(1);
            })
            .join(" ");
    }

    function renderAll() {
        if (!cachedData) return;
        var data = cachedData;
        
        // Auto-detect if 2nd innings has started (field 282 or 208)
        var secondInnsActive = (data["208"] !== "0" && data["208"] !== "");
        var view1st = !secondInnsActive;

        document.getElementById('team-header').innerHTML = formatString(data["1"]) + " v " + formatString(data["3"]);
        document.getElementById('view-label').innerHTML = view1st ? "1st Innings" : "2nd Innings (Live)";
        document.getElementById('match-info-section').style.display = view1st ? "none" : "block";

        // Score logic with fixed extraction for 1st innings
        if (view1st) {
            var summary = data["281"] || ""; // e.g. "139-7 (40)"
            var scorePart = summary.split(' ')[0]; 
            document.getElementById('main-score').innerHTML = scorePart || data["224"];
            var ovMatch = summary.match(/\(([^)]+)\)/);
            document.getElementById('main-overs').innerHTML = "(" + (ovMatch ? ovMatch[1] : "0.0") + ")";
        } else {
            document.getElementById('main-score').innerHTML = data["208"] + "-" + data["209"];
            document.getElementById('main-overs').innerHTML = "(" + data["210"] + ")";
        }

        // Batting - 1st Inns uses 269+, 2nd Inns uses 5+
        var batRows = document.getElementById('batting-rows');
        batRows.innerHTML = "";
        var bStart = view1st ? 269 : 5;
        var sStart = view1st ? 378 : 389;
        for (var i = 0; i < 11; i++) {
            var name = data[bStart + i];
            if (name && name !== "   " && name !== "0") {
                var isStriker = !view1st && data[82 + i] === "*";
                var div = document.createElement('div');
                div.className = "player-row clearfix";
                var displayName = formatString(name) + (isStriker ? " *" : "");
                div.innerHTML = '<span class="player-name' + (isStriker ? ' striker-active' : '') + '">' + displayName + '</span>' +
                                '<span class="player-stat">' + formatString(data[sStart + i]) + '</span>';
                batRows.appendChild(div);
            }
        }

        // Bowling - 1st Inns uses 181+, 2nd Inns uses 104+
        var bowlRows = document.getElementById('bowling-rows');
        bowlRows.innerHTML = "";
        var bowlStart = view1st ? 181 : 104;
        document.getElementById('bowling-header').innerHTML = view1st ? "1st Inns Bowling" : "2nd Inns Bowling";
        
        for (var j = 0; j < 11; j++) {
            var bName = data[bowlStart + j];
            var bOvers = data[115 + j];
            if (bName && bName !== "   " && parseFloat(bOvers) > 0) {
                var bDiv = document.createElement('div');
                bDiv.className = "player-row clearfix";
                bDiv.innerHTML = '<span class="player-name">' + formatString(bName) + '</span>' +
                                 '<span class="player-stat bowler-stats">' + bOvers + '-' + data[126+j] + '-' + data[137+j] + '-' + data[170+j] + '</span>';
                bowlRows.appendChild(bDiv);
            }
        }

        // Match Info
        document.getElementById('f226').innerHTML = data["226"] || "-";
        document.getElementById('f326').innerHTML = data["326"] || "-";
        document.getElementById('f325').innerHTML = data["325"] || "-";
    }

    function fetchData() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://api.npoint.io/77a687a8b60218fa9525?t=' + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                cachedData = JSON.parse(xhr.responseText);
                renderAll();
            }
        };
        xhr.send();
    }

    setInterval(fetchData, 5000);
    fetchData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chromecast Scoreboard</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .scoreboard-container { width: 920px; margin: 0 auto; border: 1px solid #333; padding: 20px; }
        
        /* Layout Fix: Floats instead of Grid for old Chrome versions */
        .left-col { float: left; width: 550px; }
        .right-col { float: right; width: 330px; }
        .clearfix { clear: both; }

        .header { border-bottom: 2px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .team-names { font-size: 32px; font-weight: bold; color: #FFD700; }
        
        .score-row { text-align: center; margin-bottom: 20px; }
        .total-score { font-size: 90px; font-weight: bold; }
        .overs { font-size: 30px; color: #888; }

        .section-header { color: #888; border-bottom: 1px solid #444; margin: 15px 0 10px 0; font-size: 14px; text-transform: uppercase; }
        
        .player-row { border-bottom: 1px solid #1a1a1a; padding: 5px 0; font-size: 18px; }
        .player-name { float: left; }
        .player-stat { float: right; color: #bbb; }
        
        .info-item { border-bottom: 1px solid #222; padding: 8px 0; font-size: 18px; }
        .info-label { color: #aaa; }
        .info-value { float: right; font-weight: bold; }
        
        .striker-active { font-weight: bold; color: #fff; }
        .bowler-stats { font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

<div class="scoreboard-container">
    <div class="header">
        <div class="team-names" id="team-header">Loading Match...</div>
    </div>

    <div class="score-row">
        <span class="total-score" id="main-score">0-0</span>
        <span class="overs" id="main-overs">(0.0)</span>
    </div>

    <div class="left-col">
        <div class="section-header">Batting: <span id="view-label">...</span></div>
        <div id="batting-rows"></div>
    </div>

    <div class="right-col">
        <div class="section-header" id="bowling-header">Bowling</div>
        <div id="bowling-rows"></div>

        <div id="match-info-section" style="display:none;">
            <div class="section-header">Match Info</div>
            <div class="info-item"><span class="info-label">Runs to Win</span><span class="info-value" id="f226">-</span></div>
            <div class="info-item"><span class="info-label">Required RR</span><span class="info-value" id="f326">-</span></div>
            <div class="info-item"><span class="info-label">Current RR</span><span class="info-value" id="f325">-</span></div>
        </div>
    </div>
    <div class="clearfix"></div>
</div>

<script>
    // Using 'var' for 1st Gen Chromecast compatibility
    var showingFirstInnings = false; 
    var cachedData = null;

    function formatString(str) {
        if (!str || str === "0" || str === "   ") return "";
        return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
    }

    function renderAll() {
        if (!cachedData) return;
        
        var data = cachedData;
        var started = (data["282"] && data["282"] !== "0" && data["282"] !== "   ");
        
        // Auto-toggle: If looking at it on a TV, we want it to show the Live innings automatically
        var view1st = false; // Add your own toggle logic if you have a remote/way to click

        document.getElementById('team-header').innerHTML = formatString(data["1"]) + " v " + formatString(data["3"]);
        document.getElementById('view-label').innerHTML = view1st ? "1st Innings" : "Live Innings";
        document.getElementById('match-info-section').style.display = view1st ? "none" : "block";

        // Score logic
        if (view1st) {
            var summary = data["281"] || "";
            document.getElementById('main-score').innerHTML = summary.split(' ')[0] || data["224"];
            var ovMatch = summary.match(/\(([^)]+)\)/);
            document.getElementById('main-overs').innerHTML = "(" + (ovMatch ? ovMatch[1] : "0.0") + ")";
        } else {
            document.getElementById('main-score').innerHTML = data["208"] + "-" + data["209"];
            document.getElementById('main-overs').innerHTML = "(" + data["210"] + ")";
        }

        // Batting
        var batRows = document.getElementById('batting-rows');
        batRows.innerHTML = "";
        var offset = view1st ? 269 : 5;
        for (var i = 0; i < 11; i++) {
            var name = data[offset + i];
            if (name && name !== "   ") {
                var div = document.createElement('div');
                div.className = "player-row clearfix";
                div.innerHTML = '<span class="player-name">' + formatString(name) + '</span>' +
                                '<span class="player-stat">' + formatString(data[(view1st ? 378 : 16) + i]) + '</span>';
                batRows.appendChild(div);
            }
        }

        // Bowling
        var bowlRows = document.getElementById('bowling-rows');
        bowlRows.innerHTML = "";
        var bOffset = view1st ? 181 : 104;
        for (var j = 0; j < 11; j++) {
            var bName = data[bOffset + j];
            var bOvers = data[115 + j];
            if (bName && bName !== "   " && parseFloat(bOvers) > 0) {
                var bDiv = document.createElement('div');
                bDiv.className = "player-row clearfix";
                bDiv.innerHTML = '<span class="player-name">' + formatString(bName) + '</span>' +
                                 '<span class="player-stat bowler-stats">' + bOvers + '-' + data[126+j] + '-' + data[137+j] + '-' + data[148+j] + '</span>';
                bowlRows.appendChild(bDiv);
            }
        }

        // Match Info
        document.getElementById('f226').innerHTML = data["226"] || "-";
        document.getElementById('f326').innerHTML = data["326"] || "-";
        document.getElementById('f325').innerHTML = data["325"] || "-";
    }

    function fetchData() {
        var xhr = new XMLHttpRequest();
        // Cache busting for Chromecast
        xhr.open('GET', 'https://api.npoint.io/77a687a8b60218fa9525?t=' + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                cachedData = JSON.parse(xhr.responseText);
                renderAll();
            }
        };
        xhr.send();
    }

    setInterval(fetchData, 5000);
    fetchData();
</script>
</body>
</html>

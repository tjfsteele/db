<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* [Keeping your original CSS and @font-face for the DSEG7 font here] */
        @font-face { 
            font-family: 'DSEG7'; 
            src: url('data:font/truetype;base64,T1RUTwALAIAAAwAwQ0ZGIFrZt6EAAAC8AAAUB0ZGVE2AqO8EAAAUxAAAABxHREVGABUAFAAAFOAAAAAcT1MvMluAahEAABT8AAAAYGNtYXB7xCFpAAAVXAAAAXJoZWFkDGlj2gAAFtAAAAA2aGhlYQbTAwQAABcIAAAAJGhtdHg5VBMEAAAXLAAAAK5tYXhwAEZQAAAAF9wAAAAGbmFtZSnTHAgAABfkAAA313Bvc3T/hgAyAABPvAAAACABAAQEAAEBARFEU0VHN01vZGVybi1Cb2xkAAECAAEAKvgbAPgcAfgdAvgeA/gUBE2L+WH6fAUcAN4PHAAAEBwBaREcAC4cEqgSAAQCAAEABQBqAHsAhzAuNDZDcmVhdGVkIGJ5IEtlc2hpa2FuKGh0dHBzOi8vdHdpdHRlci5jb20va2VzaGlub21pXzg4cHJvKQp3aX...');
        }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; margin: 0; padding: 0; }
        .board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; height: 100vh; box-sizing: border-box; }
        .item { background: #111; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .label { font-size: 4vw; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-family: 'DSEG7', monospace; font-size: 15vw; color: #f00; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .full-width { grid-column: 1 / span 2; }
        #status-dot { position: fixed; top: 10px; right: 10px; width: 15px; height: 15px; border-radius: 50%; background: #333; transition: background 0.3s; z-index: 100; }
        .dot-local { background: #0f0 !important; box-shadow: 0 0 10px #0f0; }
        .dot-cloud { background: #00f !important; box-shadow: 0 0 10px #00f; }
        #fs-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: rgba(255,255,255,0.2); border: none; color: #fff; cursor: pointer; border-radius: 5px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="status-dot"></div>
    <button id="fs-btn">Go Fullscreen</button>
    <div class="board" id="board-container"></div>

    <script>
        // --- CONFIG ---
        var LOCAL_URL = 'http://192.168.137.1/';
        var CLOUD_URL = 'https://api.npoint.io/e5ab2c288d26e7ce23ca';
        var LOCAL_SPEED = 1000;  // 1 second
        var CLOUD_SPEED = 5000;  // 5 seconds
        
        var isUsingLocal = true;
        var pollTimer = null;
        var labels = ["TOTAL", "WKTS", "OVERS", "LAST WK", "LAST INN", "BAT 1", "BAT 2", "TARGET", "DLS PAR", "REMAIN"];
        var indices = ["01", "02", "07", "03", "11", "04", "05", "10", "14", "13"];

        function initUI() {
            var container = document.getElementById('board-container');
            container.innerHTML = '';
            labels.forEach(function(l, i) {
                var div = document.createElement('div');
                div.className = 'item';
                if(l === "TOTAL") div.classList.add('full-width');
                div.innerHTML = '<div class="label">'+l+'</div><div class="value" id="val-'+indices[i]+'">---</div>';
                container.appendChild(div);
            });
        }

        function updateUI(data) {
            indices.forEach(function(idx, i) {
                var el = document.getElementById('val-'+idx);
                var val = data[parseInt(idx)-1];
                if(el && val !== undefined) {
                    // Handle empty values or spaces from the script
                    el.innerText = val.toString().trim() === "" ? "0" : val;
                }
            });
        }

        function flash(type) {
            var dot = document.getElementById('status-dot');
            dot.className = 'dot-' + type;
            setTimeout(function() { dot.className = ''; }, 300);
        }

        function poll() {
            // Safety: clear any pending timers
            if (pollTimer) clearTimeout(pollTimer);

            var x = new XMLHttpRequest();
            x.timeout = 2500; // Longer than script timeout but short enough to keep UI alive
            
            var target = isUsingLocal ? LOCAL_URL : CLOUD_URL;
            // Cache buster is essential for mobile hotspot stability
            x.open('GET', target + '?t=' + new Date().getTime(), true);

            x.onload = function() {
                if (x.status === 200) {
                    try {
                        var data = JSON.parse(x.responseText);
                        updateUI(data);
                        flash(isUsingLocal ? 'local' : 'cloud');
                        // If we were on cloud but local just worked, switch back!
                        if (!isUsingLocal) {
                            console.log("Local restored!");
                            isUsingLocal = true;
                        }
                    } catch(e) { 
                        console.error("JSON Parse Error"); 
                    }
                } else {
                    handleFailure();
                }
                scheduleNext();
            };

            x.onerror = function() { handleFailure(); scheduleNext(); };
            x.ontimeout = function() { handleFailure(); scheduleNext(); };

            function handleFailure() {
                if (isUsingLocal) {
                    console.warn("Local server unreachable. Falling back to Cloud.");
                    isUsingLocal = false;
                }
            }

            function scheduleNext() {
                var interval = isUsingLocal ? LOCAL_SPEED : CLOUD_SPEED;
                pollTimer = setTimeout(poll, interval);
            }

            x.send();
        }

        // Fullscreen Logic
        document.getElementById('fs-btn').onclick = function() {
            var e = document.documentElement;
            if (e.requestFullscreen) e.requestFullscreen();
            else if (e.webkitRequestFullscreen) e.webkitRequestFullscreen();
            else if (e.msRequestFullscreen) e.msRequestFullscreen();
            this.style.display = 'none';
        };

        // Standard Clock Tick (Optional, if your UI shows time)
        function tickClock() {
            // You can implement a clock display here if needed
        }

        // Initialize
        initUI();
        poll(); 
    </script>
</body>
</html>

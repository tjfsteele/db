<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cricket Scoreboard</title>
    <style>
        body { 
            background: white; color: black; font-family: sans-serif; 
            margin: 0; padding: 5px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        #jitter-wrapper { position: relative; width: 100%; }
        .grid { display: table; width: 100%; border-collapse: collapse; table-layout: fixed; }
        .row { display: table-row; }
        .cell { 
            display: table-cell; border: 2px solid black; 
            padding: 8px; vertical-align: middle; 
        }
        .label { font-size: 14px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .value { font-size: 38px; font-weight: bold; font-family: monospace; }
        .big-val { font-size: 55px; line-height: 1; }
        #time-status { font-size: 16px; margin-top: 15px; color: #666; font-style: italic; }
        #clock { font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="jitter-wrapper">
        <div class="grid">
            <div class="row">
                <div class="cell"><span class="label">Batter 1</span><span id="v-0" class="value">0</span></div>
                <div class="cell"><span id="clock">00:00</span></div>
                <div class="cell"><span class="label">Batter 2</span><span id="v-1" class="value">0</span></div>
            </div>
            <div class="row">
                <div class="cell"><span class="label">TOTAL</span><span id="v-4" class="value big-val">0</span></div>
                <div class="cell"><span class="label">WKTS</span><span id="v-5" class="value big-val">0</span></div>
                <div class="cell"><span class="label">OVERS</span><span id="v-6" class="value big-val">0</span></div>
            </div>
            <div class="row">
                <div class="cell"><span class="label">EXTRAS</span><span id="v-7" class="value">0</span></div>
                <div class="cell"><span class="label">LAST MAN</span><span id="v-8" class="value">0</span></div>
                <div class="cell"><span class="label">LAST WKT</span><span id="v-9" class="value">0</span></div>
            </div>
            <div class="row">
                <div class="cell"><span class="label">1st INNS</span><span id="v-10" class="value">0</span></div>
                <div class="cell"><span class="label">TO WIN</span><span id="v-11" class="value">0</span></div>
                <div class="cell"><span class="label">OV REM</span><span id="v-12" class="value">0</span></div>
            </div>
        </div>
        <div id="time-status">Initializing...</div>
    </div>

    <script>
        var PROXY_URL = "https://script.google.com/macros/s/AKfycby4gf4zULR-cQzekmZpXoBs5txrVYr7TJIQWCcwfbwkVy1uqrpz1aniyvkweHTfRbue/exec?type=score"; 
        var lastDataString = "";

        function fetchData() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", PROXY_URL + "&cb=" + new Date().getTime(), true);
            xhr.timeout = 15000;
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    if (xhr.responseText !== lastDataString) {
                        updateDisplay(xhr.responseText);
                        lastDataString = xhr.responseText;
                    }
                    updateStatus("Live");
                }
            };
            xhr.send();
        }

        function updateDisplay(rawJson) {
            try {
                var data = JSON.parse(rawJson);
                var mapping = [0, 1, 4, 5, 6, 7, 8, 9, 10, 11, 12];
                for (var i = 0; i < mapping.length; i++) {
                    var idx = mapping[i];
                    var element = document.getElementById('v-' + idx);
                    if (element) {
                        element.innerHTML = (data[idx] !== undefined && data[idx] !== null) ? data[idx] : "-";
                    }
                }
            } catch(e) {}
        }

        function updateStatus(msg) {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes();
            document.getElementById('clock').innerHTML = (h<10?'0':'')+h + ":" + (m<10?'0':'')+m;
            document.getElementById('time-status').innerHTML = msg + " Update: " + h + ":" + (m<10?'0':'')+m;
        }

        // 1. Wi-Fi Heartbeat (keeps connection alive)
        setInterval(function() {
            var ping = new XMLHttpRequest();
            ping.open("GET", "https://www.google.com/generate_204", true);
            ping.send();
        }, 15000);

        // 2. Fast Data Refresh (every 20 seconds)
        setInterval(fetchData, 20000);

        // 3. FULL PAGE RELOAD (every 5 minutes to clear E-ink ghosting)
        setInterval(function() {
            location.reload();
        }, 300000); // 300,000ms = 5 minutes

        fetchData();
    </script>
</body>
</html>

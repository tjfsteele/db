<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kobo Scoreboard</title>
    <style>
        /* CSS optimized for Kobo e-ink - High Contrast */
        body { 
            background: white; color: black; font-family: sans-serif; 
            margin: 0; padding: 5px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        #jitter-wrapper { position: relative; width: 100%; }
        .grid { display: table; width: 100%; border-collapse: collapse; table-layout: fixed; }
        .row { display: table-row; }
        .cell { 
            display: table-cell; border: 3px solid black; 
            padding: 8px; vertical-align: middle; 
        }
        .label { font-size: 14px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 2px; }
        
        /* Main Values */
        .value { font-size: 50px; font-weight: bold; font-family: monospace; }
        .big-val { font-size: 85px; line-height: 1; }
        
        /* Batter Number in brackets - Smaller */
        .player-num { font-size: 24px; font-weight: normal; vertical-align: middle; }
        
        #time-status { font-size: 14px; margin-top: 10px; color: #666; }
        #clock { font-size: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="jitter-wrapper">
        <div class="grid">
            <div class="row">
                <div class="cell">
                    <span class="label">Batter 1</span>
                    <span id="v-2" class="value">-</span> 
                    <span class="player-num">[<span id="v-0">0</span>]</span>
                </div>
                <div class="cell"><span id="clock">00:00</span></div>
                <div class="cell">
                    <span class="label">Batter 2</span>
                    <span id="v-3" class="value">-</span> 
                    <span class="player-num">[<span id="v-1">0</span>]</span>
                </div>
            </div>

            <div class="row">
                <div class="cell"><span class="label">WKTS</span><span id="v-5" class="value big-val">-</span></div>
                <div class="cell"><span class="label">TOTAL</span><span id="v-4" class="value big-val">-</span></div>
                <div class="cell"><span class="label">OVERS</span><span id="v-6" class="value big-val">-</span></div>
            </div>

            <div class="row">
                <div class="cell"><span class="label">EXTRAS</span><span id="v-7" class="value">-</span></div>
                <div class="cell"><span class="label">LAST WKT</span><span id="v-8" class="value">-</span></div>
                <div class="cell"><span class="label">LAST MAN</span><span id="v-9" class="value">-</span></div>
            </div>

            <div class="row">
                <div class="cell"><span class="label">1st INNS</span><span id="v-10" class="value">-</span></div>
                <div class="cell"><span class="label">TARGET</span><span id="v-11" class="value">-</span></div>
                <div class="cell"><span class="label">OV REM</span><span id="v-12" class="value">-</span></div>
            </div>
        </div>
        <div id="time-status">Connecting...</div>
    </div>

    <script>
        var LOCAL_URL = "http://192.168.137.1/"; 
        var CLOUD_URL = "https://api.npoint.io/e5ab2c288d26e7ce23ca";
        
        var isProtocolSecure = window.location.protocol === 'https:';
        var isUsingLocal = !isProtocolSecure; 

        function fetchData() {
            if (isProtocolSecure) isUsingLocal = false;
            var url = isUsingLocal ? LOCAL_URL : CLOUD_URL;
            var x = new XMLHttpRequest();
            x.open("GET", url + "?t=" + new Date().getTime(), true);
            x.timeout = 3000;

            x.onreadystatechange = function() {
                if (x.readyState === 4) {
                    if (x.status === 200) {
                        updateDisplay(x.responseText);
                        updateStatus(isUsingLocal ? "LIVE: LOCAL" : "LIVE: CLOUD");
                        scheduleNextUpdate();
                    } else {
                        handleFailure();
                    }
                }
            };
            x.onerror = handleFailure;
            x.ontimeout = handleFailure;
            x.send();
        }

        function handleFailure() {
            if (isUsingLocal) {
                isUsingLocal = false;
                fetchData();
            } else {
                updateStatus("OFFLINE");
                scheduleNextUpdate();
            }
        }

        function scheduleNextUpdate() {
            var interval = isUsingLocal ? 1000 : 20000;
            setTimeout(fetchData, interval);
        }

        function updateDisplay(rawJson) {
            try {
                var data = JSON.parse(rawJson);
                // Map indices 0 to 12
                for (var i = 0; i <= 12; i++) {
                    var element = document.getElementById('v-' + i);
                    if (element) {
                        var val = data[i];
                        // If empty string or null, show 0 or - depending on field
                        if (val === "" || val === null || val === undefined) {
                            element.innerHTML = (i < 10) ? "0" : "-";
                        } else {
                            element.innerHTML = val;
                        }
                    }
                }
            } catch(e) { updateStatus("DATA ERROR"); }
        }

        function updateStatus(msg) {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes();
            var timeStr = (h < 10 ? '0' : '') + h + ":" + (m < 10 ? '0' : '') + m;
            document.getElementById('clock').innerHTML = timeStr;
            document.getElementById('time-status').innerHTML = msg + " | " + timeStr;
        }

        fetchData();
        // 12 hour reload
        setTimeout(function() { window.location.reload(true); }, 43200000);
    </script>
</body>
</html>

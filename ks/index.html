<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Optimized for Kobo E-Ink: High Contrast & No Grays */
        body { 
            background: white; color: black; font-family: "Courier New", Courier, monospace; 
            margin: 0; padding: 5px; text-align: center;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }
        .grid { display: table; width: 100%; height: 92%; border-collapse: collapse; table-layout: fixed; }
        .row { display: table-row; }
        .cell { 
            display: table-cell; 
            vertical-align: middle; 
            padding: 2px;
            border: 1px solid #000; /* Thin borders for better structural definition on e-ink */
        }
        
        .label { 
            font-size: 16px; 
            font-weight: bold; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 2px;
        }
        
        /* Value Styles */
        .value { font-size: 55px; font-weight: bold; line-height: 1; display: block; }
        .big-val { font-size: 100px; } 
        .batter-num { font-size: 45px; margin-bottom: 10px; }
        
        #time-status { font-size: 12px; height: 5%; border-top: 2px solid black; padding-top: 4px; }
        #clock { font-size: 35px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="row">
            <div class="cell">
                <span id="v-0" class="value batter-num"></span>
            </div>
            <div class="cell">
                <span id="clock">00:00</span>
            </div>
            <div class="cell">
                <span id="v-1" class="value batter-num"></span>
            </div>
        </div>

        <div class="row">
            <div class="cell">
                <span class="label">BATTER</span>
                <span id="v-2" class="value big-val"></span>
            </div>
            <div class="cell">
                <span class="label">TOTAL</span>
                <span id="v-4" class="value big-val"></span>
            </div>
            <div class="cell">
                <span class="label">BATTER</span>
                <span id="v-3" class="value big-val"></span>
            </div>
        </div>

        <div class="row">
            <div class="cell">
                <span class="label">EXTRAS</span>
                <span id="v-7" class="value big-val"></span>
            </div>
            <div class="cell">
                <span class="label">WICKETS</span>
                <span id="v-5" class="value big-val"></span>
            </div>
            <div class="cell">
                <span class="label">OVERS</span>
                <span id="v-6" class="value big-val"></span>
            </div>
        </div>

        <div class="row">
            <div class="cell">
                <span class="label">1ST INNS</span>
                <span id="v-10" class="value big-val"></span>
            </div>
            <div class="cell">
                <span class="label">LAST MAN</span>
                <span id="v-8" class="value big-val"></span>
            </div>
            <div class="cell">
                <span class="label">OVERS REM</span>
                <span id="v-12" class="value big-val"></span>
            </div>
        </div>

        <div class="row">
            <div class="cell">
                <span class="label">TO WIN</span>
                <span id="v-11" class="value big-val"></span>
            </div>
            <div class="cell">
                <span class="label">LAST WKT</span>
                <span id="v-9" class="value big-val"></span>
            </div>
            <div class="cell">
                <span class="label">DLS PAR</span>
                <span id="v-13" class="value big-val"></span>
            </div>
        </div>
    </div>

    <div id="time-status">Connecting...</div>

    <script>
        var LOCAL_URL = "http://192.168.137.1/"; 
        var CLOUD_URL = "https://api.npoint.io/e5ab2c288d26e7ce23ca";
        
        var isProtocolSecure = window.location.protocol === 'https:';
        var isUsingLocal = !isProtocolSecure; 

        function fetchData() {
            var url = isUsingLocal ? LOCAL_URL : CLOUD_URL;
            var x = new XMLHttpRequest();
            x.open("GET", url + "?t=" + new Date().getTime(), true);
            x.timeout = 5000;

            x.onreadystatechange = function() {
                if (x.readyState === 4) {
                    if (x.status === 200) {
                        updateDisplay(x.responseText);
                        updateStatus(isUsingLocal ? "LIVE: LOCAL" : "LIVE: CLOUD");
                        scheduleNextUpdate();
                    } else {
                        handleFailure();
                    }
                }
            };
            x.onerror = handleFailure;
            x.send();
        }

        function handleFailure() {
            if (isUsingLocal) {
                isUsingLocal = false;
                fetchData();
            } else {
                updateStatus("OFFLINE");
                scheduleNextUpdate();
            }
        }

        function scheduleNextUpdate() {
            var interval = isUsingLocal ? 2000 : 25000;
            setTimeout(fetchData, interval);
        }

        function updateDisplay(rawJson) {
            try {
                var data = JSON.parse(rawJson);
                // Map indices 0 to 13
                for (var i = 0; i <= 13; i++) {
                    var element = document.getElementById('v-' + i);
                    if (element) {
                        var val = data[i];
                        // If empty, null, or undefined, show nothing
                        if (val === "" || val === null || typeof val === 'undefined') {
                            element.innerHTML = "&nbsp;"; 
                        } else {
                            element.innerHTML = val;
                        }
                    }
                }
            } catch(e) { updateStatus("DATA ERROR"); }
        }

        function updateStatus(msg) {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes();
            var timeStr = (h < 10 ? '0' : '') + h + ":" + (m < 10 ? '0' : '') + m;
            document.getElementById('clock').innerHTML = timeStr;
            document.getElementById('time-status').innerHTML = msg + " | " + timeStr;
        }

        fetchData();
        // 12 hour refresh to clear e-ink ghosting
        setTimeout(function() { window.location.reload(true); }, 43200000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Overs Calculator</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #1a73e8;
            --primary-hover: #1557b0;
            --border-color: #dadce0;
            --accent-bg: #e8f0fe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #111;
            font-size: 1.4rem;
        }

        .info-text {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 0.9rem;
            line-height: 1.4;
            color: #555;
            margin-bottom: 12px; /* Reduced from 25px to close the gap */
        }

        .info-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fff;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--accent-bg);
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            display: none;
            margin-bottom: 20px;
        }

        .result-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .result-main {
            font-size: 1.3rem;
            font-weight: 800;
            margin-top: 8px;
            color: #000;
        }
        
        .result-details {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            line-height: 1.4;
        }

        .comments-wrapper {
            text-align: center;
            margin-top: 5px; /* Reduced from 20px to bring it closer */
            width: 100%;
            display: block;
            position: relative;
        }

        .comments-wrapper a {
            color: #777;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
            padding: 3px 10px;
            cursor: pointer;
        }

        .comments-wrapper a:hover {
            text-decoration: underline;
            color: var(--primary-color);
        }

        .copy-toast {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Lost Overs Calculator</h2>

    <div class="form-group">
        <label for="matchType">Match Type</label>
        <select id="matchType" onchange="updateDefaults()">
            <optgroup label="Premier League">
                <option value="Div1Red">Division 1 Red Ball</option>
                <option value="Div1Pink">Division 1 Pink Ball</option>
                <option value="Div2">Division 2</option>
                <option value="Div3">Division 3</option>
            </optgroup>
            <optgroup label="Seniors Midweek & Sunday">
                <option value="O50-1">Over 50s 1st XI</option>
                <option value="O50-2">Over 50s 2nd XI</option>
                <option value="O60/70">Over 60s/70s</option>
            </optgroup>
        </select>
    </div>

    <div id="standardInputs">
        <div class="form-row">
            <div class="form-group">
                <label for="oversSide">Overs Per Side</label>
                <input type="number" id="oversSide" value="45">
            </div>

            <div class="form-group" id="inningsGroup">
                <label for="innings">Innings</label>
                <select id="innings" onchange="toggleTeaInput()">
                    <option value="1" selected>1st Innings</option>
                    <option value="2">2nd Innings</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="restart">Restart Time (HH:MM)</label>
            <input type="time" id="restart">
        </div>

        <div class="form-group">
            <label for="oversRemaining">Overs Remaining in Innings (e.g., 29.4)</label>
            <input type="number" step="0.1" id="oversRemaining" value="45.0">
        </div>

        <div class="form-group">
            <label for="finish">Agreed Finish Time (HH:MM)</label>
            <input type="time" id="finish" value="19:30">
        </div>

        <div class="form-group" id="teaGroup">
            <label for="tea">Tea Interval (minutes)</label>
            <input type="number" id="tea" value="20">
        </div>
    </div>

    <div id="saturdayInputs" style="display: none;">
        <div class="form-row">
            <div class="form-group">
                <label for="satOversSide">Overs Per Side</label>
                <input type="number" id="satOversSide" value="50">
            </div>
            <div class="form-group" id="satInningsGroup">
                <label for="satInnings">Innings</label>
                <select id="satInnings">
                    <option value="1" selected>1st Innings</option>
                    <option value="2">2nd Innings</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="minsLost">Cumulative Minutes Lost</label>
            <input type="number" id="minsLost" value="0" min="0">
        </div>
    </div>

    <input type="hidden" id="rate" value="15">

    <button type="button" onclick="calculateOvers()">Calculate Overs to Remove</button>

    <div class="result-box" id="resultBox">
        <div id="resultOutput" class="result-main"></div>
        <div id="detailsOutput" class="result-details"></div>
    </div>
    
    <div class="info-text" id="infoBox">
        <a id="regLink" href="#" target="_blank">Loading tournament regulations...</a>
    </div>

    <div class="comments-wrapper">
        <span class="copy-toast" id="copyToast">Email copied to clipboard!</span>
        <a href="mailto:scorer@tjfs.com" onclick="handleEmailClick(event)">scorer@tjfs.com</a>
    </div>
    
</div>

<script>
    // Traditional rules parameters
    const weekdayConfigs = {
        "O50-1": ["19:30", 15, 20, "https://tjfsteele.github.io/pdf/Over%2050's%201st%20XI%20Competition%20rules%202026.pdf", "Over 50 1st XI Playing Regulations 2026"],
        "O50-2": ["19:30", 18, 20, "https://tjfsteele.github.io/pdf/Over%2050s%202s%20Playing_Conditions_2026.pdf", "Over 50 2nd XI Playing Regulations 2026"],
        "O60/70": ["20:00", 16, 30, "https://tjfsteele.github.io/pdf/Over%2060_70%20Playing-Regulations-2026.pdf", "Over 60/70 Playing Regulations 2026"]
    };

    // Saturday rules parameters
    const saturdayConfigs = {
        "Div1Red": { defaultOvers: 110, hideInnings: true },
        "Div1Pink": { defaultOvers: 50, hideInnings: false },
        "Div2": { defaultOvers: 50, hideInnings: false },
        "Div3": { defaultOvers: 45, hideInnings: false }
    };

    // League regulation link shared across all Saturday setups
    const leagueRegsUrl = "https://tjfsteele.github.io/pdf/Onyx_Handbook_2026.pdf#page=54";
    const leagueRegsLabel = "League Competition Playing Regulations 2026";

    function handleEmailClick(event) {
        const email = "scorer@tjfs.com";
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(email).then(() => {
                showToast();
            }).catch(() => {
                fallbackCopy(email);
            });
        } else {
            fallbackCopy(email);
        }
    }

    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; 
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            showToast();
        } catch (err) {}
        document.body.removeChild(textArea);
    }

    function showToast() {
        const toast = document.getElementById("copyToast");
        toast.style.display = "block";
        setTimeout(() => {
            toast.style.display = "none";
        }, 2500);
    }

    function getRoundedCurrentTime() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        
        const remainder = minutes % 5;
        if (remainder !== 0) minutes += (5 - remainder);
        if (minutes === 60) { minutes = 0; hours += 1; }
        if (hours === 24) hours = 0;
        
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    }

    function setInitialDefaultMatch() {
        const today = new Date().getDay();
        const dropdown = document.getElementById("matchType");

        if (today === 6) {
            dropdown.value = "Div2";
        } else if (today === 3) {
            dropdown.value = "O50-2";
        } else {
            dropdown.value = "O60/70";
        }
    }

    function updateDefaults() {
        const type = document.getElementById("matchType").value;
        const isSaturdayRules = saturdayConfigs.hasOwnProperty(type);
        const linkElement = document.getElementById("regLink");

        if (isSaturdayRules) {
            document.getElementById("standardInputs").style.display = "none";
            document.getElementById("saturdayInputs").style.display = "block";

            const config = saturdayConfigs[type];
            document.getElementById("satOversSide").value = config.defaultOvers;
            
            const inningsGroup = document.getElementById("satInningsGroup");
            if (config.hideInnings) {
                inningsGroup.style.display = "none";
            } else {
                inningsGroup.style.display = "block";
            }

            linkElement.href = leagueRegsUrl;
            linkElement.innerText = leagueRegsLabel;
        } else {
            document.getElementById("standardInputs").style.display = "block";
            document.getElementById("saturdayInputs").style.display = "none";

            const config = weekdayConfigs[type];
            document.getElementById("finish").value = config[0];
            document.getElementById("rate").value = config[1];
            document.getElementById("tea").value = config[2];

            linkElement.href = config[3];
            linkElement.innerText = config[4];
            
            toggleTeaInput();
        }
    }

    function toggleTeaInput() {
        const type = document.getElementById("matchType").value;
        if (!saturdayConfigs.hasOwnProperty(type)) {
            const innings = document.getElementById("innings").value;
            document.getElementById("teaGroup").style.display = (innings === "2") ? "none" : "block";
        }
    }

    function overToBalls(overStr) {
        if (!overStr) return 0;
        if (overStr.includes('.')) {
            const parts = overStr.split('.');
            return (parseInt(parts[0], 10) || 0) * 6 + (parseInt(parts[1], 10) || 0);
        }
        return (parseInt(overStr, 10) || 0) * 6;
    }

    function calculateOvers() {
        try {
            const type = document.getElementById("matchType").value;
            if (saturdayConfigs.hasOwnProperty(type)) {
                calculateSaturdayOvers(type);
            } else {
                calculateStandardOvers();
            }
        } catch (e) {
            alert("Please verify that all inputs are filled in correctly.");
        }
    }

    function calculateSaturdayOvers(matchType) {
        const minsLost = parseFloat(document.getElementById("minsLost").value) || 0;
        const baseOvers = parseInt(document.getElementById("satOversSide").value, 10);
        const innings = document.getElementById("satInnings").value;

        let oversLost = 0;
        let detailsText = "";

        if (minsLost <= 30) {
            oversLost = 0;
            detailsText = "No overs lost as cumulative delay is 30 minutes or under.";
        } else {
            const extraMinutes = minsLost - 30;
            
            if (innings === "2" || matchType === "Div1Red") {
                oversLost = Math.floor(extraMinutes / 3.5);
                detailsText = `Lost time above cushion: ${extraMinutes} mins.<br>Calculated at 1 over per 3.5 minutes.`;
            } else {
                oversLost = Math.floor(extraMinutes / 7);
                detailsText = `Lost time above cushion: ${extraMinutes} mins.<br>Calculated at 1 over per 7 minutes.`;
            }
        }

        const newOvers = Math.max(0, baseOvers - oversLost);

        let mainMessage = "";
        if (matchType === "Div1Red" || innings === "1") {
            mainMessage = `Remove ${oversLost} overs from each innings`;
        } else {
            mainMessage = `Remove ${oversLost} overs from 2nd innings`;
        }

        document.getElementById("resultOutput").innerHTML = mainMessage;
        document.getElementById("detailsOutput").innerHTML = `
            ${detailsText}<br>
            Original base overs: <strong>${baseOvers}</strong><br>
            Revised overs per side: <strong>${newOvers}</strong>
        `;
        document.getElementById("resultBox").style.display = "block";
    }

    function calculateStandardOvers() {
        const restartStr = document.getElementById("restart").value;
        const finishStr = document.getElementById("finish").value;
        
        if (!restartStr || !finishStr) {
            alert("Please fill in both Restart and Finish times.");
            return;
        }

        const [rH, rM] = restartStr.split(':').map(Number);
        let [fH, fM] = finishStr.split(':').map(Number);

        let availableMins = (fH * 60 + fM) - (rH * 60 + rM);
        if (availableMins <= 0) availableMins += 24 * 60;

        const innings = document.getElementById("innings").value;
        if (innings === "1") {
            availableMins -= parseFloat(document.getElementById("tea").value) || 0;
        }

        if (availableMins <= 0) {
            alert("Error: No playing time left after subtracting variables.");
            return;
        }

        const ratePerHour = parseFloat(document.getElementById("rate").value);
        const minsPerOver = 60.0 / ratePerHour;
        const agreedOversPerSide = parseInt(document.getElementById("oversSide").value, 10);

        const possibleOversRemaining = Math.ceil(availableMins / minsPerOver);
        const totalRemainingBalls = overToBalls(document.getElementById("oversRemaining").value);
        const scheduledOversRemainingCeil = Math.floor(totalRemainingBalls / 6) + (totalRemainingBalls % 6 > 0 ? 1 : 0);

        let totalMatchOversLeft = (innings === "1") ? scheduledOversRemainingCeil + agreedOversPerSide : scheduledOversRemainingCeil;
        let oversLost = Math.max(0, totalMatchOversLeft - possibleOversRemaining);
        
        let warningText = "";
        if (innings === "1" && oversLost > scheduledOversRemainingCeil) {
            warningText = `<br><span style="color: #d93025; font-size: 0.9rem; font-weight: bold;">Did you mean to select 2nd Innings?</span>`;
        }

        if (innings === "1") {
            const oversPerInnings = Math.floor(oversLost / 2);
            const hasRemainder = (oversLost % 2 !== 0);
            let mainMessage = `Remove ${oversPerInnings} overs from each innings`;
            if (hasRemainder) {
                mainMessage += ` <span style="font-size:1rem; font-weight:normal; color:#555;">(with 1 extra over remaining)</span>`;
            }
            document.getElementById("resultOutput").innerHTML = mainMessage + warningText;
        } else {
            document.getElementById("resultOutput").innerHTML = `Remove ${oversLost} overs from 2nd innings ${warningText}`;
        }

        document.getElementById("detailsOutput").innerHTML = `
            Total overs lost: <strong>${oversLost} overs</strong><br>
            Available Playing Time: <strong>${availableMins} mins</strong><br>
            Max overs fitting in time: <strong>${possibleOversRemaining}</strong>
        `;
        document.getElementById("resultBox").style.display = "block";
    }

    function initApp() {
        setInitialDefaultMatch();
        updateDefaults();
        document.getElementById("restart").value = getRoundedCurrentTime();
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initApp);
    } else {
        initApp();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<body>
    <h2>Scorebox Finder</h2>
    <button id="scanBtn">Find & Open Scorebox</button>
    <p id="status">Click the button to scan...</p>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const status = document.getElementById('status');
        
        scanBtn.addEventListener('click', async () => {
            try {
                status.innerText = "Requesting Scan Permission...";
                
                // 1. Request a scan for a specific name
                const scan = await navigator.bluetooth.requestLEScan({
                    filters: [{ name: 'Scorebox' }],
                    keepRepeatedDevices: true
                });
        
                status.innerText = "Scanning for Scorebox packets...";
        
                // 2. Listen for the advertisement
                navigator.bluetooth.addEventListener('advertisementreceived', event => {
                    if (event.device.name === 'Scorebox') {
                        status.innerText = "Scorebox found! Extracting IP...";
                        
                        // 3. Extract Manufacturer Data
                        // event.manufacturerData is a Map of [CompanyID, DataView]
                        for (let [companyId, dataView] of event.manufacturerData) {
                            const decoder = new TextDecoder('utf-8');
                            const ipAddress = decoder.decode(dataView);
                            
                            // Cleanup any non-printable characters or whitespace
                            const cleanIP = ipAddress.replace(/[^\d.]/g, ''); 
        
                            if (cleanIP.includes('.')) {
                                status.innerText = `IP Found: ${cleanIP}. Opening...`;
                                scan.stop(); // Stop scanning once found
                                
                                setTimeout(() => {
                                    window.location.href = `http://${cleanIP}`;
                                }, 800);
                                return;
                            }
                        }
                    }
                });
        
            } catch (error) {
                status.innerText = "Scan failed: " + error;
                console.error(error);
            }
        });
    </script>
</body>
</html>

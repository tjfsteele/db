<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorebox Link</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        button { background: #007AFF; color: white; border: none; padding: 16px 32px; font-size: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; }
        #status { margin-top: 20px; font-size: 14px; color: #666; min-height: 3em; line-height: 1.4; }
        .ip-val { color: #28a745; font-family: monospace; font-weight: bold; font-size: 1.2rem; display: block; margin: 5px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>Scorebox 3</h2>
    <button id="btn">Find Scorebox</button>
    <div id="status">Tap to start...</div>
</div>

<script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
        try {
            status.innerText = "Requesting Bluetooth...";
            
            // Look for the new shortened name
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Scorebox' }],
                optionalServices: [0xDEAD] 
            });

            status.innerHTML = "<b>Found SBox!</b><br>Reading IP from broadcast...";

            device.addEventListener('advertisementreceived', (event) => {
                if (event.manufacturerData && event.manufacturerData.size > 0) {
                    // Pull the string from manufacturer data
                    const dataView = event.manufacturerData.values().next().value;
                    const rawStr = new TextDecoder().decode(dataView);
                    
                    // Regex: extract digits and dots only
                    const cleanIP = rawStr.replace(/[^\d.]/g, '');

                    if (cleanIP.length >= 7 && cleanIP.includes('.')) {
                        status.innerHTML = `Connected to Scorebox!<br><span class="ip-val">${cleanIP}</span><br>Opening browser in 2s...`;
                        
                        // Stop scanning
                        device.watchAdvertisements({once: true});

                        setTimeout(() => {
                            window.location.href = `http://${cleanIP}`;
                        }, 2000);
                    } else {
                        status.innerText = "Received data, but IP was empty or invalid.";
                    }
                }
            });

            // Start the listener
            await device.watchAdvertisements();

        } catch (error) {
            status.innerText = "Error: " + error.message;
            if (error.message.includes("watchAdvertisements")) {
                status.innerHTML += "<br><b>Enable 'Experimental Web Platform features' in chrome://flags</b>";
            }
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorebox Connect</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 400px; }
        button { background-color: #007bff; color: white; border: none; padding: 15px 25px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 20px; color: #555; line-height: 1.5; font-weight: 500; }
        .ip-display { color: #28a745; font-weight: bold; font-family: monospace; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Scorebox Finder</h2>
    <p>Tap below to scan for the Scorebox device and open its web interface.</p>
    <button id="scanBtn">Find Scorebox</button>
    <div id="status">Ready to scan...</div>
</div>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const status = document.getElementById('status');
    
    scanBtn.addEventListener('click', async () => {
        try {
            status.innerText = "Searching for Scorebox...";
            
            // Use a broader filter to ensure the background scanner stays active
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Scorebox' }],
                optionalServices: [0xDEAD, 'device_information']
            });
    
            status.innerHTML = "<b>Scorebox Found!</b><br>Listening for IP packet...";
    
            // Set up a timeout hint
            const timeoutHint = setTimeout(() => {
                if (status.innerText.includes("Listening")) {
                    status.innerHTML += "<br><i style='font-size:0.8em'>Still waiting... is the Scorebox broadcasting?</i>";
                }
            }, 5000);
    
            device.addEventListener('advertisementreceived', (event) => {
                console.log("Packet detected!", event);
                
                if (event.manufacturerData && event.manufacturerData.size > 0) {
                    clearTimeout(timeoutHint);
                    
                    // Pull the first available manufacturer data entry
                    const dataView = event.manufacturerData.values().next().value;
                    const decoder = new TextDecoder('utf-8');
                    const rawString = decoder.decode(dataView);
                    
                    // Clean the IP: Keep only numbers and dots
                    const cleanIP = rawString.replace(/[^\d.]/g, '');
    
                    if (cleanIP.length >= 7 && cleanIP.includes('.')) {
                        status.innerHTML = `Success!<br>IP: <span class="ip-display">${cleanIP}</span><br>Redirecting...`;
                        
                        setTimeout(() => {
                            window.location.href = `http://${cleanIP}`;
                        }, 2000);
                    }
                }
            });
    
            // CRITICAL: This is what triggers the 'advertisementreceived' event
            await device.watchAdvertisements();
    
        } catch (error) {
            status.innerText = "Error: " + error.message;
        }
    });
</script>

</body>
</html>

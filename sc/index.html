<!DOCTYPE html>
<html>
<body>
    <h2>Scorebox Finder</h2>
    <button id="scanBtn">Find & Open Scorebox</button>
    <p id="status">Click the button to scan...</p>

    <script>
        document.getElementById('scanBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            try {
                status.innerText = "Requesting Scorebox...";
                
                // 1. Find the device
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Scorebox' }],
                    optionalServices: ['device_information'] // Standard service
                });
        
                status.innerText = "Found! Connecting...";
                
                // 2. Connect to the GATT Server
                const server = await device.gatt.connect();
                
                status.innerText = "Connected! Reading IP...";
        
                // 3. Get the Service (Using 'device_information' as a placeholder)
                const service = await server.getPrimaryService('device_information');
                
                // 4. Get the Characteristic (Using 'serial_number_string' or similar)
                // Note: You'll need to make sure your Scorebox provides the IP here!
                const characteristic = await service.getCharacteristic('serial_number_string');
                
                const value = await characteristic.readValue();
                
        
                status.innerText = `Opening http://${value}...`;
                window.location.href = `http://${value}`;
        
            } catch (error) {
                status.innerText = "Error: " + error;
                console.error(error);
            }
        });
    </script>
</body>
</html>

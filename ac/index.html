<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octopus Agile Solid Dial</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #clock-container { width: 95vw; height: 95vw; max-width: 500px; position: relative; }
        svg { width: 100%; height: 100%; }
        .hour-text { fill: #444; font-size: 7px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
        #now-pointer { fill: #fff; filter: drop-shadow(0 0 4px #fff); }
        .center-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        #status { font-size: 2.8rem; font-weight: 800; margin: 0; line-height: 1; }
        #price-display { font-size: 1.5rem; margin: 8px 0; font-weight: 300; }
        .label { font-size: 0.7rem; letter-spacing: 4px; color: #666; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="clock-container">
    <svg viewBox="0 0 240 240" id="clock-svg">
        <circle cx="120" cy="120" r="90" stroke="#111" stroke-width="6" fill="none" />
        <g id="segments"></g>
        <g id="labels"></g>
        <rect id="now-pointer" x="118.5" y="24" width="3" height="12" rx="1.5" />
    </svg>
    <div class="center-ui">
        <p class="label">Agile Live</p>
        <p id="status">---</p>
        <p id="price-display">--</p>
    </div>
</div>

<script>
    const REGION = 'A'; 
    const API_URL = `https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REGION}/standard-unit-rates/`;

    async function init() {
        const labelsG = document.getElementById('labels');
        for (let i = 0; i < 24; i++) {
            const angle = (i / 24) * 360 - 90;
            const rad = angle * Math.PI / 180;
            const x = 120 + 112 * Math.cos(rad);
            const y = 120 + 112 * Math.sin(rad);
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x); text.setAttribute("y", y);
            text.setAttribute("class", "hour-text");
            text.textContent = i;
            labelsG.appendChild(text);
        }
        update();
        setInterval(update, 60000);
    }

    async function update() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const rates = data.results.reverse(); 
            const segs = document.getElementById('segments');
            segs.innerHTML = '';
            const now = new Date();

            rates.forEach(r => {
                const start = new Date(r.valid_from);
                const h = start.getHours() + (start.getMinutes() / 60);
                const startA = (h / 24) * 360 - 90;
                // Added a tiny overlap (0.51 instead of 0.5) to close the gaps
                const endA = startA + (0.51 / 24) * 360; 
                
                let color = '#00ff88';
                const p = r.value_inc_vat;
                if (p > 15) color = '#FFCC00'; 
                if (p > 25) color = '#ff4444'; 
                if (p < 0)  color = '#00e5ff'; 

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", describeArc(120, 120, 90, startA, endA));
                path.setAttribute("stroke", color);
                path.setAttribute("stroke-width", "8");
                path.setAttribute("fill", "none");
                path.setAttribute("stroke-linecap", "butt"); // Ensures blocks touch flatly
                segs.appendChild(path);

                if (now >= start && now < new Date(r.valid_to)) {
                    document.getElementById('price-display').innerHTML = `${p.toFixed(1)}p <span style="opacity:0.3">|</span> kWh`;
                    document.getElementById('status').innerText = p > 25 ? "High" : (p > 15 ? "Mid" : "Low");
                    document.getElementById('status').style.color = color;
                }
            });

            const rotation = ((now.getHours() * 60 + now.getMinutes()) / 1440) * 360;
            document.getElementById('now-pointer').setAttribute("transform", `rotate(${rotation} 120 120)`);
        } catch (e) { console.error(e); }
    }

    function describeArc(x, y, r, startA, endA) {
        const s = { x: x + r * Math.cos(endA * Math.PI / 180), y: y + r * Math.sin(endA * Math.PI / 180) };
        const e = { x: x + r * Math.cos(startA * Math.PI / 180), y: y + r * Math.sin(startA * Math.PI / 180) };
        return `M ${s.x} ${s.y} A ${r} ${r} 0 0 0 ${e.x} ${e.y}`;
    }

    init();
</script>
</body>
</html>

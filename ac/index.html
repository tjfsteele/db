<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octopus Agile Clock</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #clock-container { width: 95vw; height: 95vw; max-width: 500px; position: relative; touch-action: none; }
        svg { width: 100%; height: 100%; background: #000; cursor: crosshair; }
        
        .hour-text { fill: #222; font-size: 10px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
        #now-pointer { fill: #fff; filter: drop-shadow(0 0 3px rgba(255,255,255,0.8)); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; z-index: 10; }
        
        .price-segment { pointer-events: none; stroke-width: 6; }

        .center-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; width: 60%; }
        #status { font-size: 3.8rem; font-weight: 900; margin: 0; line-height: 0.9; letter-spacing: -3px; }
        #price-display { font-size: 1rem; margin: 8px 0; color: #444; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; }
        #label-text { font-size: 0.7rem; letter-spacing: 4px; color: #333; text-transform: uppercase; margin-bottom: 8px; }
        #tracker-ref { font-size: 0.9rem; color: #555; margin-top: 5px; font-weight: 600; padding-top: 10px; border-top: 1px solid #111; }
        
        /* New styling for the region badge */
        #region-badge { 
            font-size: 0.8rem; 
            color: #222; 
            border: 1px solid #222; 
            display: inline-block; 
            padding: 2px 6px; 
            border-radius: 4px; 
            margin-top: 10px;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div id="clock-container">
    <svg viewBox="0 0 240 240" id="clock-svg">
        <circle cx="120" cy="120" r="85" stroke="#111" stroke-width="12" fill="none" />
        <g id="segments"></g>
        <g id="labels"></g>
        <rect id="now-pointer" x="118.5" y="24" width="3" height="16" rx="1.5" />
    </svg>

    <div class="center-ui">
        <p id="label-text">Agile Pricing</p>
        <p id="status">--.-p</p>
        <div id="price-display">per kWh</div>
        <div id="tracker-ref">Tracker: --p</div>
        <div id="region-badge">Region --</div>
    </div>
</div>

<script>
    console.log('script starting');
    const urlParams = new URLSearchParams(window.location.search);
    const REGION = (urlParams.get('region') || 'A').toUpperCase();
    document.getElementById('region-badge').innerText = `Region ${REGION}`;

    const AGILE_API = `https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REGION}/standard-unit-rates/`;
    const TRACKER_API = `https://api.octopus.energy/v1/products/SILVER-26-04-01/electricity-tariffs/E-1R-SILVER-26-04-01-${REGION}/standard-unit-rates/`;
    
    let cachedAgile = [];
    let trackerPrice = null;
    let isInteracting = false;
    let revertTimeout = null;

    const parseDate = (dStr) => new Date(Date.parse(dStr));

    async function init() {
        drawDial();
        await fetchData(); 
        setupInteractions();
        setInterval(refreshUI, 30000); 
    }

    function drawDial() {
        const labelsG = document.getElementById('labels');
        for (let i = 0; i < 24; i++) {
            const angle = (i / 24) * 360 - 90;
            const rad = angle * Math.PI / 180;
            const x = 120 + 106 * Math.cos(rad);
            const y = 120 + 106 * Math.sin(rad);
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x); text.setAttribute("y", y);
            text.setAttribute("class", "hour-text");
            text.textContent = i;
            labelsG.appendChild(text);
        }
    }

    function hasTomorrowData() {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const tomorrowStr = tomorrow.toISOString().split('T')[0];
        return cachedAgile.some(r => r.valid_from.startsWith(tomorrowStr));
    }
    
    async function fetchData() {
        try {
            const now = new Date();
            const [tRes, aRes] = await Promise.all([fetch(TRACKER_API), fetch(AGILE_API)]);
            const tData = await tRes.json();
            const aData = await aRes.json();
    
            const currentTracker = tData.results.find(r => {
                const start = new Date(r.valid_from);
                const end = new Date(r.valid_to);
                return now >= start && now < end;
            });
    
            trackerPrice = currentTracker ? currentTracker.value_inc_vat : tData.results[0].value_inc_vat;
            document.getElementById('tracker-ref').innerText = `Tracker: ${trackerPrice.toFixed(2)}p`;
    
            cachedAgile = aData.results;
            console.log(`Fetched ${cachedAgile.length} Agile rates.`);
            renderSegments();
            updateClockUI();
        } catch (e) { console.error("Fetch Error:", e); }
    }

    function getSegmentStyle(price) {
        // If price is near zero or negative, it should always be green/magenta
        if (price <= 1.0) return { color: price < 0 ? '#f0f' : '#00ff88', opacity: 1.0 };
        
        if (trackerPrice === null) return { color: '#444', opacity: 0.5 };
        
        // Compare against Tracker, but give a "green" pass to anything reasonable
        const isCheap = price <= trackerPrice;
        const delta = Math.abs(price - trackerPrice);
        const opacity = Math.min(1, 0.4 + (delta / 15)); 
        const color = isCheap ? '#00ff88' : '#ff4444';
        return { color, opacity };
    }
    
    function renderSegments() {
        const segs = document.getElementById('segments');
        segs.innerHTML = '';
        const now = new Date();
        const currentBlockStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes() < 30 ? 0 : 30);
        const gapStart = new Date(currentBlockStart.getTime() - (30 * 60 * 1000));
        const cutoff = new Date(now.getTime() + (24 * 60 * 60 * 1000));

        const sortedData = [...cachedAgile].sort((a, b) => parseDate(a.valid_from) - parseDate(b.valid_from));

        // PASS 1: Draw all colored price segments first
        sortedData.forEach(r => {
            const start = parseDate(r.valid_from);
            const end = parseDate(r.valid_to);

            // Only draw if it's in our 24h window
            if (end > now && start < cutoff) {
                const h = start.getHours() + (start.getMinutes() / 60);
                const startA = (h / 24) * 360 - 90;
                const endA = startA + (0.5 / 24) * 360; 

                const style = getSegmentStyle(r.value_inc_vat);
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", describeArc(120, 120, 85, startA + 0.5, endA - 0.5));
                path.setAttribute("stroke", style.color);
                path.setAttribute("stroke-opacity", style.opacity);
                path.setAttribute("style", "stroke-width: 6;");
                path.setAttribute("class", "price-segment");
                path.setAttribute("fill", "none");
                segs.appendChild(path);
            }
        });

        // PASS 2: Draw the Black Gap LAST so it is on the top layer
        const gapRecord = cachedAgile.find(r => parseDate(r.valid_from).getTime() === gapStart.getTime());
        if (gapRecord) {
            const start = parseDate(gapRecord.valid_from);
            const h = start.getHours() + (start.getMinutes() / 60);
            const startA = (h / 24) * 360 - 90;
            const endA = startA + (0.5 / 24) * 360; 

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", describeArc(120, 120, 85, startA + 0.5, endA - 0.5));
            path.setAttribute("stroke", "#000000"); // Pure Black
            path.setAttribute("stroke-opacity", "1");
            path.setAttribute("style", "stroke-width: 16;"); // Extra thick to hide colored tips
            path.setAttribute("fill", "none");
            path.setAttribute("class", "gap-segment");
            segs.appendChild(path);
            console.log("Black Gap Layered on top.");
        }
    }
    
    function refreshUI() {
        renderSegments(); 
        updateClockUI();
        if (new Date().getHours() >= 16 && !hasTomorrowData()) fetchData();
    }
    
    function setupInteractions() {
        const container = document.getElementById('clock-container');
        const svg = document.getElementById('clock-svg');

        const handlePointer = (e) => {
            const rect = svg.getBoundingClientRect();
            const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
            const clientY = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
            if (clientX === undefined) return;

            const x = clientX - (rect.left + rect.width / 2);
            const y = clientY - (rect.top + rect.height / 2);
            let angle = Math.atan2(y, x) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;

            const targetHour = (angle / 360) * 24;
            const now = new Date();
            const targetTimeInMs = now.setHours(0,0,0,0) + (targetHour * 3600000);
            const cutoff = new Date(now.getTime() + 24 * 60 * 60 * 1000);

            // Find the rate, prioritizing the most immediate one
            // Ensure we look for the block that matches the hour AND is within the next 24 hours
            const rate = cachedAgile.reduce((prev, curr) => {
                const currTime = parseDate(curr.valid_from).getTime();
                const prevTime = prev ? parseDate(prev.valid_from).getTime() : Infinity;
                
                const currDiff = Math.abs(currTime - targetTimeInMs);
                const prevDiff = Math.abs(prevTime - targetTimeInMs);
                
                // We want the one matching the hour that is nearest to the current actual time
                return currDiff < prevDiff ? curr : prev;
            }, null);

            if (rate) {
                isInteracting = true;
                if (revertTimeout) clearTimeout(revertTimeout);
                const d = parseDate(rate.valid_from);
                const isTomorrow = d.getDate() !== now.getDate();
                const style = getSegmentStyle(rate.value_inc_vat);
                document.getElementById('label-text').innerText = (isTomorrow ? "Tomorrow " : "@ ") + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('label-text').style.color = style.color;
                updateDisplay(rate.value_inc_vat, style.color);
            }
        };

        container.addEventListener('mousemove', handlePointer);
        container.addEventListener('touchstart', (e) => { if(e.cancelable) e.preventDefault(); handlePointer(e); }, {passive: false});
        container.addEventListener('touchend', () => { revertTimeout = setTimeout(resetToLive, 1200); });
        container.addEventListener('mouseleave', resetToLive);
    }

    function resetToLive() {
        isInteracting = false;
        document.getElementById('label-text').innerText = "Agile Pricing";
        document.getElementById('label-text').style.color = "#333";
        updateClockUI();
    }

    function updateDisplay(price, color) {
        document.getElementById('status').innerText = `${price.toFixed(1)}p`;
        document.getElementById('status').style.color = color;
    }

    function updateClockUI() {
        if (isInteracting) return;
        const now = new Date();
        const rotation = (((now.getHours() * 60) + now.getMinutes()) / 1440) * 360;
        document.getElementById('now-pointer').setAttribute("transform", `rotate(${rotation} 120 120)`);
        
        const currentRate = cachedAgile.find(r => {
            const s = parseDate(r.valid_from);
            const e = parseDate(r.valid_to);
            return now >= s && now < e;
        });
        if (currentRate) updateDisplay(currentRate.value_inc_vat, getSegmentStyle(currentRate.value_inc_vat).color);
    }
    
    function describeArc(x, y, r, startA, endA) {
        const s = { x: x + r * Math.cos(endA * Math.PI / 180), y: y + r * Math.sin(endA * Math.PI / 180) };
        const e = { x: x + r * Math.cos(startA * Math.PI / 180), y: y + r * Math.sin(startA * Math.PI / 180) };
        return `M ${s.x} ${s.y} A ${r} ${r} 0 0 0 ${e.x} ${e.y}`;
    }

    init();
</script>
</body>
</html>

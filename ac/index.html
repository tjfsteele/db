<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octopus Agile vs Tracker Clock</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #clock-container { width: 95vw; height: 95vw; max-width: 500px; position: relative; }
        svg { width: 100%; height: 100%; }
        .hour-text { fill: #666; font-size: 11px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
        #now-pointer { fill: #fff; filter: drop-shadow(0 0 3px #fff); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .center-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        #status { font-size: 3.5rem; font-weight: 800; margin: 0; line-height: 1; letter-spacing: -2px; }
        #price-display { font-size: 1.1rem; margin: 5px 0; color: #888; font-weight: 300; }
        .label { font-size: 0.7rem; letter-spacing: 4px; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        #region-indicator { font-size: 0.6rem; color: #333; margin-top: 5px; }
        #tracker-ref { font-size: 0.85rem; color: #aaa; margin-top: 2px; font-weight: 500; border-top: 1px solid #222; padding-top: 5px; }
    </style>
</head>
<body>

<div id="clock-container">
    <svg viewBox="0 0 240 240" id="clock-svg">
        <circle cx="120" cy="120" r="85" stroke="#111" stroke-width="1" fill="none" />
        <g id="segments"></g>
        <g id="labels"></g>
        <rect id="now-pointer" x="119.2" y="31" width="1.6" height="10" rx="0.8" />
    </svg>

    <div class="center-ui">
        <p class="label">Agile vs Tracker</p>
        <p id="status">---</p>
        <div id="price-display">per kWh</div>
        <div id="tracker-ref">Tracker: --p</div>
        <p id="region-indicator"></p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const REGION = (urlParams.get('region') || 'A').toUpperCase();
    
    const AGILE_API = `https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REGION}/standard-unit-rates/`;
    const TRACKER_API = `https://api.octopus.energy/v1/products/SILVER-26-04-01/electricity-tariffs/E-1R-SILVER-26-04-01-${REGION}/standard-unit-rates/`;
    
    let lastFetchDate = null;
    let cachedAgile = [];
    let trackerPrice = null;

    async function init() {
        document.getElementById('region-indicator').innerText = `Region: ${REGION}`;
        drawDial();
        await fetchData(); 
        setInterval(checkUpdates, 60000);
    }

    function drawDial() {
        const labelsG = document.getElementById('labels');
        for (let i = 0; i < 24; i++) {
            const angle = (i / 24) * 360 - 90;
            const rad = angle * Math.PI / 180;
            const x = 120 + 108 * Math.cos(rad);
            const y = 120 + 108 * Math.sin(rad);
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x); text.setAttribute("y", y);
            text.setAttribute("class", "hour-text");
            text.textContent = i;
            labelsG.appendChild(text);
        }
    }

    async function fetchData() {
        try {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            // 1. Fetch Tracker
            const tRes = await fetch(TRACKER_API);
            const tData = await tRes.json();
            // Specifically find the rate valid for the START of today
            const todayTracker = tData.results.find(r => r.valid_from.startsWith(todayStr));
            trackerPrice = todayTracker ? todayTracker.value_inc_vat : tData.results[0].value_inc_vat;
            document.getElementById('tracker-ref').innerText = `Tracker: ${trackerPrice.toFixed(2)}p`;

            // 2. Fetch Agile
            const aRes = await fetch(AGILE_API);
            const aData = await aRes.json();
            // Store all but we will filter in the render function
            cachedAgile = aData.results;
            
            lastFetchDate = now.toLocaleDateString();
            
            renderSegments();
            updateClockUI();
        } catch (e) {
            console.error("API Fetch failed", e);
        }
    }

    function getPriceColor(price) {
        if (price < 0) return '#00e5ff'; 
        if (trackerPrice === null) return '#666';
        return price <= trackerPrice ? '#00ff88' : '#ff4444'; 
    }

    function renderSegments() {
        const segs = document.getElementById('segments');
        segs.innerHTML = '';
        
        const now = new Date();
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
        const endOfToday = startOfToday + (24 * 60 * 60 * 1000);

        cachedAgile.forEach(r => {
            const validFrom = new Date(r.valid_from).getTime();
            
            // CRITICAL: Only render if the segment belongs to "Today"
            // This prevents tomorrow's high prices from overlapping today's segments
            if (validFrom >= startOfToday && validFrom < endOfToday) {
                const start = new Date(r.valid_from);
                const h = start.getHours() + (start.getMinutes() / 60);
                const startA = (h / 24) * 360 - 90;
                const endA = startA + (0.5 / 24) * 360; 
                
                const color = getPriceColor(r.value_inc_vat);

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", describeArc(120, 120, 85, startA, endA));
                path.setAttribute("stroke", color);
                path.setAttribute("stroke-width", "4");
                path.setAttribute("fill", "none");
                segs.appendChild(path);
            }
        });
    }

    function updateClockUI() {
        const now = new Date();
        const mins = now.getMinutes();
        
        const snappedMins = mins < 30 ? 0 : 30;
        const rotation = (((now.getHours() * 60) + snappedMins) / 1440) * 360;
        document.getElementById('now-pointer').setAttribute("transform", `rotate(${rotation} 120 120)`);

        const currentRate = cachedAgile.find(r => {
            const start = new Date(r.valid_from);
            const end = new Date(r.valid_to);
            return now >= start && now < end;
        });

        if (currentRate) {
            const p = currentRate.value_inc_vat;
            const color = getPriceColor(p);
            document.getElementById('status').innerText = `${p.toFixed(1)}p`;
            document.getElementById('status').style.color = color;
        }
    }

    function checkUpdates() {
        const now = new Date();
        const mins = now.getMinutes();
        if (mins === 0 || mins === 30) {
            renderSegments(); // Re-render segments to clear old data
            updateClockUI();
        }
        
        const todayStr = now.toLocaleDateString();
        if (now.getHours() >= 16 && lastFetchDate !== todayStr) {
            fetchData();
        }
    }

    function describeArc(x, y, r, startA, endA) {
        const s = { x: x + r * Math.cos(endA * Math.PI / 180), y: y + r * Math.sin(endA * Math.PI / 180) };
        const e = { x: x + r * Math.cos(startA * Math.PI / 180), y: y + r * Math.sin(startA * Math.PI / 180) };
        return `M ${s.x} ${s.y} A ${r} ${r} 0 0 0 ${e.x} ${e.y}`;
    }

    init();
</script>
</body>
</html>
